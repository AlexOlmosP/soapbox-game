<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Soapbox Racer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Boogaloo&family=Nunito:wght@800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --font-display: 'Boogaloo', 'Arial Black', sans-serif;
    --font-body: 'Nunito', 'Arial Black', sans-serif;
    --font-mono: 'Courier New', monospace;
    --bg-dark: #1a1a2e;
    --bg-overlay: rgba(0, 0, 0, 0.6);
    --bg-card: rgba(255, 255, 255, 0.12);
    --bg-card-solid: #2a2a4a;
    --red: #FF3344;
    --orange: #FF8800;
    --yellow: #FFD700;
    --green: #44DD66;
    --blue: #4488FF;
    --purple: #AA44FF;
    --pink: #FF44AA;
    --text-primary: #FFFFFF;
    --text-secondary: rgba(255, 255, 255, 0.7);
    --text-shadow: 3px 3px 0 rgba(0, 0, 0, 0.5);
    --text-shadow-heavy: 4px 4px 0 rgba(0, 0, 0, 0.7);
    --btn-primary: #FF3344;
    --btn-border: 4px solid rgba(0, 0, 0, 0.3);
    --border-radius: 16px;
    --border-radius-lg: 24px;
  }
  html, body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    position: fixed;
    width: 100%;
    height: 100%;
    touch-action: none;
    background: #1a1a2e;
    font-family: var(--font-body);
  }
  /* City skyline background behind the WebGL canvas */
  #skyline-bg {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: url('bg-skyline.png') center center / cover no-repeat;
    z-index: 0;
  }
  canvas { display: block; }

  #hud {
    position: absolute;
    top: 0; left: 0; right: 0;
    padding: 12px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    pointer-events: none;
    background: linear-gradient(to bottom, rgba(0,0,0,0.4) 0%, rgba(0,0,0,0) 100%);
    z-index: 10;
  }
  .hud-item {
    color: #fff;
    font-family: var(--font-mono);
    font-size: 20px;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.7);
    letter-spacing: 1px;
  }

  #countdown-overlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    pointer-events: none;
    z-index: 20;
  }
  #countdown-text {
    font-family: var(--font-display);
    font-size: 150px;
    color: #fff;
    text-shadow: 4px 4px 12px rgba(0,0,0,0.6), 0 0 40px rgba(255,255,255,0.3);
    animation: countdownPop 0.7s ease-out forwards;
  }
  #countdown-text.go {
    color: #44FF44;
  }
  @keyframes countdownPop {
    0% { transform: scale(2.5); opacity: 0; }
    40% { transform: scale(0.9); opacity: 1; }
    100% { transform: scale(1); opacity: 1; }
  }

  #gameover-overlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    display: none;
    justify-content: center;
    align-items: center;
    background: rgba(0,0,0,0.5);
    z-index: 30;
  }
  #gameover-card {
    background: rgba(20,20,30,0.92);
    border-radius: 20px;
    padding: 40px 50px;
    text-align: center;
    border: 3px solid rgba(255,255,255,0.15);
    box-shadow: 0 10px 40px rgba(0,0,0,0.6);
  }
  #gameover-card h1 {
    font-family: var(--font-display);
    font-size: 52px;
    color: #FF4444;
    margin: 0 0 20px 0;
    text-shadow: 3px 3px 8px rgba(0,0,0,0.5);
    letter-spacing: 4px;
  }
  .stat-row {
    display: flex;
    justify-content: space-between;
    gap: 40px;
    margin: 15px 0;
  }
  .stat-label {
    color: #aaa;
    font-family: var(--font-body);
    font-size: 16px;
  }
  .stat-value {
    color: #fff;
    font-family: var(--font-display);
    font-size: 22px;
  }
  .float-text {
    position: absolute;
    font-family: var(--font-display);
    font-size: 24px;
    font-weight: bold;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.7);
    pointer-events: none;
    white-space: nowrap;
    transform: translate(-50%, -50%);
    z-index: 25;
  }

  .milestone-banner { position:absolute; top:30%; left:50%; transform:translateX(-50%); display:flex; flex-direction:column; align-items:center; animation: milestonePop 2s ease-out forwards; pointer-events:none; z-index:25; }
  .milestone-value { font-size:48px; color:#FFD700; font-family:var(--font-display); text-shadow:3px 3px 6px rgba(0,0,0,0.6); }
  .milestone-label { font-size:16px; color:#fff; font-family:var(--font-body); text-shadow:2px 2px 4px rgba(0,0,0,0.5); letter-spacing:3px; }
  @keyframes milestonePop { 0%{transform:translateX(-50%) scale(0.3);opacity:0} 15%{transform:translateX(-50%) scale(1.1);opacity:1} 25%{transform:translateX(-50%) scale(1)} 75%{opacity:1} 100%{transform:translateX(-50%) translateY(-30px);opacity:0} }

  #hud-speed { position:absolute; bottom:20px; right:16px; width:100px; height:12px; background:rgba(0,0,0,0.4); border-radius:6px; overflow:hidden; z-index:10; }
  #speed-fill { height:100%; background:linear-gradient(90deg,#44DD66,#FFD700,#FF3344); border-radius:6px; width:0%; transition:width 0.3s; }
  #hud-multiplier { position:absolute; top:50px; right:16px; color:#FFD700; font-family:var(--font-display); font-size:14px; text-shadow:1px 1px 3px rgba(0,0,0,0.7); z-index:10; }

  .coin-bump { animation: coinBump 0.2s ease-out; }
  @keyframes coinBump { 0%{transform:scale(1)} 50%{transform:scale(1.4)} 100%{transform:scale(1)} }

  .new-highscore { color:#FFD700; font-size:28px; font-family:var(--font-display); text-shadow:0 0 15px rgba(255,215,0,0.6); animation: hsBlink 0.6s ease-in-out infinite alternate; margin-bottom:10px; }
  @keyframes hsBlink { 0%{opacity:0.7} 100%{opacity:1} }

  .game-btn {
    font-family: var(--font-display);
    font-size: 24px;
    color: white;
    text-shadow: var(--text-shadow);
    background: var(--btn-primary);
    border: var(--btn-border);
    border-radius: var(--border-radius);
    padding: 14px 36px;
    cursor: pointer;
    transition: transform 0.1s, box-shadow 0.1s;
    box-shadow: 0 6px 0 rgba(0,0,0,0.3);
    text-transform: uppercase;
    letter-spacing: 2px;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }
  .game-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 0 rgba(0,0,0,0.3); }
  .game-btn:active { transform: translateY(3px); box-shadow: 0 2px 0 rgba(0,0,0,0.3); }
  .game-btn.secondary { background: var(--blue); }
  .game-btn.large { font-size: 32px; padding: 18px 48px; border-radius: var(--border-radius-lg); }
  .game-btn.pulse { animation: btnPulse 1.5s ease-in-out infinite; }
  @keyframes btnPulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.05)} }

  .coin-flash {
    position: absolute; inset: 0; pointer-events: none; z-index: 7;
    background: radial-gradient(circle at 50% 50%, rgba(255,215,0,0.25) 0%, transparent 70%);
    animation: coinFlashAnim 0.25s ease-out forwards;
  }
  @keyframes coinFlashAnim { 0%{opacity:1} 100%{opacity:0} }

  @media (max-width: 480px) {
    #screen-title h1:first-child { font-size: 48px !important; }
    #screen-title h1:last-child { font-size: 60px !important; }
    .game-btn { font-size: 20px; padding: 12px 28px; }
    .game-btn.large { font-size: 26px; padding: 14px 36px; }
  }
</style>
</head>
<body>
<div id="skyline-bg"></div>

<div id="blackout" style="position:absolute;top:0;left:0;right:0;bottom:0;background:#000;z-index:50;pointer-events:none;opacity:0;transition:opacity 0.2s;display:none;"></div>

<div id="screen-title" style="position:absolute;top:0;left:0;right:0;bottom:0;display:flex;flex-direction:column;justify-content:center;align-items:center;z-index:40;background:linear-gradient(180deg,transparent 0%,rgba(0,0,0,0.3) 60%,rgba(0,0,0,0.6) 100%);pointer-events:auto;">
  <div style="text-align:center;margin-bottom:32px;">
    <h1 style="font-family:var(--font-display);font-size:72px;color:var(--yellow);text-shadow:var(--text-shadow-heavy);margin:0;line-height:0.9;">SOAPBOX</h1>
    <h1 style="font-family:var(--font-display);font-size:88px;color:var(--red);text-shadow:var(--text-shadow-heavy);margin:0;margin-top:-8px;">RACE!</h1>
  </div>
  <button id="tap-to-start" class="game-btn large pulse" onclick="startFromTitle()">TAP TO START</button>
  <div style="display:flex;gap:32px;margin-top:40px;">
    <div style="display:flex;flex-direction:column;align-items:center;gap:4px;">
      <span style="font-size:24px;">&#127942;</span>
      <span style="font-family:var(--font-body);font-size:12px;color:var(--text-secondary);text-transform:uppercase;letter-spacing:2px;">High Score</span>
      <span id="title-highscore" style="font-family:var(--font-display);font-size:28px;color:white;text-shadow:var(--text-shadow);">0</span>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:4px;">
      <span style="font-size:24px;">&#129689;</span>
      <span style="font-family:var(--font-body);font-size:12px;color:var(--text-secondary);text-transform:uppercase;letter-spacing:2px;">Total Coins</span>
      <span id="title-coins" style="font-family:var(--font-display);font-size:28px;color:white;text-shadow:var(--text-shadow);">0</span>
    </div>
  </div>
</div>

<div id="hud" style="display:none;">
  <div class="hud-item" id="hud-distance">&#127937; 0 m</div>
  <div class="hud-item" id="hud-score">&#11088; 0</div>
  <div class="hud-item" id="hud-coins">&#129689; 0</div>
  <button id="hud-pause" style="pointer-events:auto;font-size:22px;background:rgba(255,255,255,0.15);border:none;border-radius:50%;width:44px;height:44px;cursor:pointer;color:white;-webkit-tap-highlight-color:transparent;" onclick="togglePause()">&#9208;</button>
</div>
<div id="hud-speed" style="display:none;"><div id="speed-fill"></div></div>
<div id="hud-multiplier" style="display:none;">x1.00</div>
<div id="vignette" style="position:absolute;inset:0;pointer-events:none;z-index:4;background:radial-gradient(ellipse at center,transparent 55%,rgba(0,0,0,0.3) 100%);opacity:0;transition:opacity 0.5s;"></div>
<div id="speed-lines" style="position:absolute;inset:0;pointer-events:none;z-index:5;opacity:0;transition:opacity 0.5s;background:radial-gradient(ellipse at center,transparent 40%,rgba(255,255,255,0.03) 60%,rgba(255,255,255,0.08) 80%,rgba(255,255,255,0.15) 100%);transform:scaleY(2.5);"></div>
<div id="boost-overlay" style="position:absolute;inset:0;pointer-events:none;z-index:6;opacity:0;transition:opacity 0.3s;background:radial-gradient(ellipse at center,transparent 50%,rgba(0,220,255,0.1) 70%,rgba(0,220,255,0.25) 100%);"></div>
<div id="effects-layer" style="position:absolute;top:0;left:0;right:0;bottom:0;pointer-events:none;z-index:15;"></div>

<div id="countdown-overlay" style="display:none;">
  <div id="countdown-text">3</div>
</div>

<div id="screen-pause" style="position:absolute;top:0;left:0;right:0;bottom:0;display:none;justify-content:center;align-items:center;z-index:35;">
  <div style="position:absolute;inset:0;background:rgba(0,0,0,0.6);backdrop-filter:blur(4px);"></div>
  <div style="position:relative;z-index:1;background:var(--bg-card-solid);border-radius:var(--border-radius-lg);padding:32px 40px;text-align:center;box-shadow:0 12px 40px rgba(0,0,0,0.5);">
    <h2 style="font-family:var(--font-display);font-size:48px;color:white;text-shadow:var(--text-shadow-heavy);margin:0 0 24px 0;">PAUSED</h2>
    <div style="display:flex;flex-direction:column;gap:12px;">
      <button class="game-btn" onclick="resumeGame()">RESUME</button>
      <button class="game-btn secondary" onclick="quitToTitle()">QUIT</button>
    </div>
  </div>
</div>

<div id="gameover-overlay">
  <div id="gameover-card">
    <h1>WIPEOUT!</h1>
    <div id="go-highscore-badge" class="new-highscore" style="display:none;">NEW HIGH SCORE!</div>
    <div class="stat-row">
      <span class="stat-label">DISTANCE</span>
      <span class="stat-value" id="go-distance">0 m</span>
    </div>
    <div class="stat-row">
      <span class="stat-label">SCORE</span>
      <span class="stat-value" id="go-score">0</span>
    </div>
    <div class="stat-row">
      <span class="stat-label">COINS</span>
      <span class="stat-value" id="go-coins">0</span>
    </div>
    <div class="stat-row">
      <span class="stat-label">NEAR MISSES</span>
      <span class="stat-value" id="go-nearmisses">0</span>
    </div>
    <div class="stat-row">
      <span class="stat-label">STYLE</span>
      <span class="stat-value" id="go-style">x1.00</span>
    </div>
    <div class="stat-row" style="margin-top:10px;border-top:1px solid rgba(255,255,255,0.1);padding-top:10px;">
      <span class="stat-label">HIGH SCORE</span>
      <span class="stat-value" id="go-highscore">0</span>
    </div>
    <div style="display:flex;flex-direction:column;gap:12px;margin-top:24px;">
      <button class="game-btn large pulse" onclick="restartGame()">RACE AGAIN</button>
      <button class="game-btn secondary" onclick="showGarage()">GARAGE</button>
    </div>
  </div>
</div>

<div id="screen-garage" style="position:absolute;top:0;left:0;right:0;bottom:0;display:none;z-index:40;pointer-events:auto;">
  <!-- Back button -->
  <button onclick="quitToTitle()" style="position:absolute;top:16px;left:16px;z-index:2;background:rgba(255,255,255,0.12);border:2px solid rgba(255,255,255,0.2);border-radius:12px;color:white;font-family:var(--font-body);font-size:14px;padding:8px 16px;cursor:pointer;">&#8592; BACK</button>

  <!-- Vehicle name -->
  <div style="position:absolute;top:16px;left:50%;transform:translateX(-50%);z-index:2;">
    <input id="garage-vehicle-name" type="text" value="My Soapbox" maxlength="20" oninput="garageSetName(this.value)" style="background:rgba(255,255,255,0.1);border:2px solid rgba(255,255,255,0.2);border-radius:10px;color:white;font-family:var(--font-display);font-size:20px;text-align:center;padding:6px 16px;outline:none;width:200px;">
  </div>

  <!-- Part picker panel (right side) -->
  <div style="position:absolute;top:60px;right:12px;bottom:80px;width:240px;z-index:2;display:flex;flex-direction:column;gap:8px;overflow:hidden;">
    <!-- Tabs -->
    <div style="display:flex;flex-wrap:wrap;gap:4px;">
      <button class="garage-tab" data-tab="chassis" onclick="garageSelectTab('chassis')" style="flex:1;min-width:60px;padding:6px 4px;border-radius:8px;border:2px solid #FFD700;background:rgba(255,215,0,0.3);color:white;font-family:var(--font-body);font-size:11px;cursor:pointer;text-transform:uppercase;">Chassis</button>
      <button class="garage-tab" data-tab="wheels" onclick="garageSelectTab('wheels')" style="flex:1;min-width:60px;padding:6px 4px;border-radius:8px;border:2px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.08);color:white;font-family:var(--font-body);font-size:11px;cursor:pointer;text-transform:uppercase;">Wheels</button>
      <button class="garage-tab" data-tab="top" onclick="garageSelectTab('top')" style="flex:1;min-width:60px;padding:6px 4px;border-radius:8px;border:2px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.08);color:white;font-family:var(--font-body);font-size:11px;cursor:pointer;text-transform:uppercase;">Top</button>
      <button class="garage-tab" data-tab="side" onclick="garageSelectTab('side')" style="flex:1;min-width:60px;padding:6px 4px;border-radius:8px;border:2px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.08);color:white;font-family:var(--font-body);font-size:11px;cursor:pointer;text-transform:uppercase;">Side</button>
      <button class="garage-tab" data-tab="front" onclick="garageSelectTab('front')" style="flex:1;min-width:60px;padding:6px 4px;border-radius:8px;border:2px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.08);color:white;font-family:var(--font-body);font-size:11px;cursor:pointer;text-transform:uppercase;">Front</button>
      <button class="garage-tab" data-tab="back" onclick="garageSelectTab('back')" style="flex:1;min-width:60px;padding:6px 4px;border-radius:8px;border:2px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.08);color:white;font-family:var(--font-body);font-size:11px;cursor:pointer;text-transform:uppercase;">Back</button>
      <button class="garage-tab" data-tab="helmet" onclick="garageSelectTab('helmet')" style="flex:1;min-width:60px;padding:6px 4px;border-radius:8px;border:2px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.08);color:white;font-family:var(--font-body);font-size:11px;cursor:pointer;text-transform:uppercase;">Helmet</button>
    </div>
    <!-- Part grid -->
    <div id="garage-part-grid" style="display:flex;flex-wrap:wrap;gap:2px;overflow-y:auto;flex:1;align-content:flex-start;"></div>
    <!-- Color picker -->
    <div id="garage-color-picker" style="display:none;flex-direction:column;gap:6px;">
      <div style="color:rgba(255,255,255,0.6);font-family:var(--font-body);font-size:11px;text-transform:uppercase;letter-spacing:1px;">Color</div>
      <div id="garage-color-swatches" style="display:flex;flex-wrap:wrap;gap:6px;"></div>
    </div>
  </div>

  <!-- Stats bars (bottom-left) -->
  <div style="position:absolute;bottom:16px;left:16px;z-index:2;background:rgba(0,0,0,0.4);border-radius:12px;padding:12px 16px;">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;">
      <span style="color:#FF3344;font-family:var(--font-body);font-size:12px;font-weight:800;width:32px;">SPD</span>
      <div id="garage-stat-spd" style="display:flex;"></div>
    </div>
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;">
      <span style="color:#4488FF;font-family:var(--font-body);font-size:12px;font-weight:800;width:32px;">HDL</span>
      <div id="garage-stat-hdl" style="display:flex;"></div>
    </div>
    <div style="display:flex;align-items:center;gap:8px;">
      <span style="color:#FFD700;font-family:var(--font-body);font-size:12px;font-weight:800;width:32px;">STY</span>
      <div id="garage-stat-sty" style="display:flex;"></div>
    </div>
  </div>

  <!-- RACE button (bottom-right) -->
  <button class="game-btn large pulse" onclick="startRaceFromGarage()" style="position:absolute;bottom:16px;right:16px;z-index:2;">RACE!</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script>
(function() {
  // ===================== CONSTANTS =====================
  const SEGMENT_LENGTH = 12;
  const VISIBLE_SEGMENTS = 8;
  const ROAD_WIDTH = 5.4;
  const LANE_WIDTH = 1.4;
  const LANES = [-1.4, 0, 1.4];
  const BASE_SPEED = 8;
  const SPAWN_DISTANCE = 60;
  const MIN_ROW_GAP_BASE = 12;
  const CAM_OFFSET = new THREE.Vector3(0, 3.0, 5.5);
  const CAM_LOOK_AHEAD = new THREE.Vector3(0, 0.5, -8);
  const PLAYER_HITBOX = new THREE.Vector3(0.6, 0.7, 1.0);
  const MAX_DT = 0.05;
  const DOWNHILL_SLOPE = 0.06; // Y drops 0.06 per meter of Z distance

  const OBSTACLE_HITBOXES = {
    barrel: new THREE.Vector3(0.6, 0.8, 0.6),
    cone: new THREE.Vector3(0.4, 0.6, 0.4),
    hay_bale: new THREE.Vector3(1.2, 0.8, 0.8),
    ramp: new THREE.Vector3(1.2, 0.5, 1.0),
    pothole: new THREE.Vector3(1.0, 0.05, 1.0),
    tire_stack: new THREE.Vector3(0.7, 1.0, 0.7),
    barrier: new THREE.Vector3(1.5, 0.9, 0.3),
    trash_can: new THREE.Vector3(0.5, 0.7, 0.5)
  };
  const OBSTACLE_COLORS = {
    barrel: 0xFF6633,
    cone: 0xFF8800,
    hay_bale: 0xDDBB44,
    ramp: 0x44DD66,
    pothole: 0x333333,
    tire_stack: 0x333333,
    barrier: 0xFF4444,
    trash_can: 0x888888
  };

  const PATTERNS_EASY = [
    [true, false, false],
    [false, true, false],
    [false, false, true]
  ];
  const PATTERNS_MEDIUM = [
    [true, true, false],
    [true, false, true],
    [false, true, true]
  ];
  var PATTERNS_SEQUENCE = [
    { rows: [[false,true,true],[true,true,false]], gap: 1.0 },
    { rows: [[true,false,false],[false,false,true]], gap: 1.0 },
    { rows: [[false,true,true],[true,true,false],[false,true,true]], gap: 0.8 }
  ];

  var SPEED_TABLE = { 0: 9.5, 100: 11.0, 300: 12.5, 600: 14.0, 1000: 15.5, 1500: 16.5, 2000: 17.0 };
  var SPEED_TABLE_KEYS = [0, 100, 300, 600, 1000, 1500, 2000];
  var COLLECTIBLE_HITBOX = new THREE.Vector3(0.6, 0.6, 0.6);

      if (decoType && DECO_STATS[slot][decoType]) {

  // ===================== TOON SHADING =====================
  function createGradientMap3() {
    const data = new Uint8Array([0,0,0, 140,140,140, 255,255,255]);
    const tex = new THREE.DataTexture(data, 3, 1, THREE.RGBFormat);
    tex.minFilter = THREE.NearestFilter;
    tex.magFilter = THREE.NearestFilter;
    tex.needsUpdate = true;
    return tex;
  }

  function createGradientMap5() {
    const data = new Uint8Array([0,0,0, 64,64,64, 128,128,128, 192,192,192, 255,255,255]);
    const tex = new THREE.DataTexture(data, 5, 1, THREE.RGBFormat);
    tex.minFilter = THREE.NearestFilter;
    tex.magFilter = THREE.NearestFilter;
    tex.needsUpdate = true;
    return tex;
  }

  const GRADIENT_MAPS = {
    standard: createGradientMap3(),
    soft: createGradientMap5()
  };

  function createToonMaterial(color, gradientType) {
    gradientType = gradientType || 'standard';
    return new THREE.MeshToonMaterial({
      color: color,
      gradientMap: GRADIENT_MAPS[gradientType]
    });
  }

  function addOutline(object, thickness) {
    thickness = thickness !== undefined ? thickness : 0.04;
    var children = [];
    object.traverse(function(child) {
      if (child.isMesh && !child.userData.isOutline && !child.userData.noOutline) {
        children.push(child);
      }
    });
    for (var i = 0; i < children.length; i++) {
      var child = children[i];
      var outlineMesh = child.clone();
      outlineMesh.material = new THREE.MeshBasicMaterial({
        color: 0x222222,
        side: THREE.BackSide
      });
      outlineMesh.scale.multiplyScalar(1 + thickness);
      outlineMesh.castShadow = false;
      outlineMesh.receiveShadow = false;
      outlineMesh.userData.isOutline = true;
      outlineMesh.renderOrder = -1;
      child.parent.add(outlineMesh);
    }
  }

  function createBuildingRow(side, segLen) {
    var group = new THREE.Group();
    var xBase = side * (ROAD_WIDTH / 2 + 2.0);
    var z = -segLen / 2;

    while (z < segLen / 2 - 0.5) {
      var w = 1.8 + Math.random() * 2.5;
      var h = 3 + Math.random() * 5;
      var d = 2.5 + Math.random() * 1.5;
      var color = BUILDING_COLORS[Math.floor(Math.random() * BUILDING_COLORS.length)];

      // Main building body
      var buildGeo = new THREE.BoxGeometry(d, h, w);
      var buildMat = createToonMaterial(color);
      var building = new THREE.Mesh(buildGeo, buildMat);
      building.position.set(xBase + side * d / 2, h / 2, z + w / 2);
      building.castShadow = true;
      building.userData.noOutline = true;
      group.add(building);

      // Colored roof accent
      var roofColor = ROOF_COLORS[Math.floor(Math.random() * ROOF_COLORS.length)];
      var roofGeo = new THREE.BoxGeometry(d + 0.15, 0.2, w + 0.15);
      var roof = new THREE.Mesh(roofGeo, createToonMaterial(roofColor));
      roof.position.set(xBase + side * d / 2, h + 0.1, z + w / 2);
      roof.userData.noOutline = true;
      group.add(roof);

      // Windows on the road-facing side
      var winRows = Math.max(1, Math.floor((h - 1) / 1.2));
      var winCols = Math.max(1, Math.floor(w / 1.0));

      for (var wy = 0; wy < winRows; wy++) {
        for (var wz = 0; wz < winCols; wz++) {
          var win = new THREE.Mesh(WIN_GEO, Math.random() < 0.35 ? WIN_LIT_MAT : WIN_DARK_MAT);
          var winX = xBase - side * 0.01;
          win.position.set(winX, 1.2 + wy * 1.2, z + 0.5 + wz * 1.0);
          if (side < 0) win.rotation.y = Math.PI;
          win.userData.noOutline = true;
          group.add(win);
        }
      }

      // Ground-level awning (40% chance)
      if (Math.random() < 0.4) {
        var awColor = AWNING_COLORS[Math.floor(Math.random() * AWNING_COLORS.length)];
        var awGeo = new THREE.BoxGeometry(0.8, 0.05, w * 0.6);
        var awn = new THREE.Mesh(awGeo, createToonMaterial(awColor));
        awn.position.set(xBase - side * 0.3, 1.8, z + w / 2);
        awn.rotation.z = side * 0.15;
        awn.userData.noOutline = true;
        group.add(awn);
      }

      // Lamppost (20% chance per building)
      if (Math.random() < 0.2) {
        var pole = new THREE.Mesh(
          new THREE.CylinderGeometry(0.03, 0.04, 2.5, 6),
          createToonMaterial(0x444444)
        );
        pole.position.set(xBase - side * 1.5, 1.25, z + w / 2);
        pole.userData.noOutline = true;
        group.add(pole);
        var lamp = new THREE.Mesh(
          new THREE.SphereGeometry(0.1, 6, 4),
          new THREE.MeshBasicMaterial({ color: 0xFFDD66 })
        );
        lamp.position.set(xBase - side * 1.5, 2.6, z + w / 2);
        lamp.userData.noOutline = true;
        group.add(lamp);
      }

      z += w + 0.15;
    }

    return group;
  }

  function createSegment() {
    var group = new THREE.Group();

    // Road
    var roadGeo = new THREE.PlaneGeometry(ROAD_WIDTH, SEGMENT_LENGTH);
    roadGeo.rotateX(-Math.PI / 2);
    var road = new THREE.Mesh(roadGeo, createToonMaterial(0x2A2A3E));
    road.receiveShadow = true;
    group.add(road);

    // Curbs
    var curbGeo = new THREE.BoxGeometry(0.3, 0.1, SEGMENT_LENGTH);
    var curbMat = createToonMaterial(0xFF2255);
    var leftCurb = new THREE.Mesh(curbGeo, curbMat);
    leftCurb.position.set(-(ROAD_WIDTH / 2 + 0.15), 0.05, 0);
    group.add(leftCurb);
    var rightCurb = new THREE.Mesh(curbGeo, curbMat);
    rightCurb.position.set(ROAD_WIDTH / 2 + 0.15, 0.05, 0);
    group.add(rightCurb);

    // Lane dividers (dashed)
    var divGeo = new THREE.PlaneGeometry(0.12, 1.5);
    divGeo.rotateX(-Math.PI / 2);
    var divMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
    var dashCount = Math.floor(SEGMENT_LENGTH / 3);
    for (var d = 0; d < dashCount; d++) {
      var zPos = -SEGMENT_LENGTH / 2 + d * 3 + 1.5;
      // Left divider
      var divL = new THREE.Mesh(divGeo, divMat);
      divL.position.set(-LANE_WIDTH * 0.5, 0.005, zPos);
      group.add(divL);
      // Right divider
      var divR = new THREE.Mesh(divGeo, divMat);
      divR.position.set(LANE_WIDTH * 0.5, 0.005, zPos);
      group.add(divR);
    }

    // Sidewalks
    var swGeo = new THREE.PlaneGeometry(2.0, SEGMENT_LENGTH);
    swGeo.rotateX(-Math.PI / 2);
    var swMat = createToonMaterial(0x888899);
    var leftSW = new THREE.Mesh(swGeo, swMat);
    leftSW.position.set(-(ROAD_WIDTH / 2 + 1.0), 0.08, 0);
    leftSW.receiveShadow = true;
    group.add(leftSW);
    var rightSW = new THREE.Mesh(swGeo, swMat);
    rightSW.position.set(ROAD_WIDTH / 2 + 1.0, 0.08, 0);
    rightSW.receiveShadow = true;
    group.add(rightSW);

    // Building rows
    group.add(createBuildingRow(-1, SEGMENT_LENGTH));
    group.add(createBuildingRow(1, SEGMENT_LENGTH));

    return group;
  }

  // Track group tilts the entire road as one piece — no stair steps

  function initTrack() {
    var totalSegments = VISIBLE_SEGMENTS + 2;
    for (var i = 0; i < totalSegments; i++) {
      var seg;
      if (segmentPool.length > i) {
        seg = segmentPool[i];
      } else {
        seg = createSegment();
        segmentPool.push(seg);
        trackGroup.add(seg);
      }
      seg.position.z = -i * SEGMENT_LENGTH;
      seg.position.y = 0;
      seg.visible = true;
    }
  }

  function updateTrack(dt) {
    // Move all segments toward camera
    for (var i = 0; i < segmentPool.length; i++) {
      segmentPool[i].position.z += scrollSpeed * dt;
    }
    // Recycle segments that passed behind camera
    for (var i = 0; i < segmentPool.length; i++) {
      if (segmentPool[i].position.z > SEGMENT_LENGTH) {
        // Find current furthest segment
        var minZ = Infinity;
        for (var j = 0; j < segmentPool.length; j++) {
          if (segmentPool[j].position.z < minZ) minZ = segmentPool[j].position.z;
        }
        var newZ = minZ - SEGMENT_LENGTH;
        segmentPool[i].position.z = newZ;
        segmentPool[i].position.y = 0;
        spawnSceneryForZ(newZ);
      }
    }
  }
