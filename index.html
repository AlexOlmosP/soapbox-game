        var pipe = new THREE.Mesh(new THREE.CylinderGeometry(0.03,0.025,0.12,8), createToonMaterial(c));
        pipe.position.set(x, 0, 0);
        pipe.rotation.x = Math.PI/2;
        group.add(pipe);
      });
    } else {
      group.add(new THREE.Mesh(new THREE.BoxGeometry(0.12,0.08,0.06), createToonMaterial(c)));
    }
    return group;
  }

  // GLB asset map — add entries as 3D assets are created
  // rotY: extra Y rotation to fix orientation (radians)
  var GLB_ASSETS = {
    chassis: {
      banana: { file: 'Meshy_AI_banana_3d_0329211148_texture.glb', rotY: Math.PI }
    }
  };
  var glbCache = {};

  function loadGLB(url) {
    if (glbCache[url]) return Promise.resolve(glbCache[url].clone());
    return new Promise(function(resolve, reject) {
      var loader = new THREE.GLTFLoader();
      loader.load(url, function(gltf) {
        var model = gltf.scene;
        glbCache[url] = model;
        resolve(model.clone());
      }, undefined, function(err) {
        console.warn('GLB load failed:', url, err);
        reject(err);
      });
    });
  }

  function toonifyModel(model, color) {
    model.traverse(function(child) {
      if (child.isMesh && child.material) {
        var origColor = color ? new THREE.Color(color) :
          (child.material.color ? child.material.color.clone() : new THREE.Color(0xcccccc));
        child.material = createToonMaterial(origColor);
        child.castShadow = true;
        child.receiveShadow = true;
      }
    });
    addOutline(model);
  }

  function assembleVehicle() {
    while (vehicleGroup.children.length > 0) {
      vehicleGroup.remove(vehicleGroup.children[0]);
    }
    wheels = [];

    var cd = CHASSIS_DIMS[vehicleData.chassis.type];
    var chassisType = vehicleData.chassis.type;

    // Check if GLB asset exists for this chassis
    var glbAsset = GLB_ASSETS.chassis && GLB_ASSETS.chassis[chassisType];
    if (glbAsset) {
      var glbFile = glbAsset.file || glbAsset;
      var extraRotY = glbAsset.rotY || 0;
      loadGLB(glbFile).then(function(model) {
        toonifyModel(model, vehicleData.chassis.color);
        // Measure raw model size
        var box = new THREE.Box3().setFromObject(model);
        var size = box.getSize(new THREE.Vector3());
        // Auto-rotate: if model is wider (X) than deep (Z), rotate 90° so it points forward
        if (size.x > size.z * 1.2) {
          model.rotation.y = Math.PI / 2;
          // Re-measure after rotation
          box.setFromObject(model);
          size = box.getSize(new THREE.Vector3());
        }
        // Per-model rotation fix (e.g. flip 180° if model faces backward)
        if (extraRotY) {
          model.rotation.y += extraRotY;
          box.setFromObject(model);
          size = box.getSize(new THREE.Vector3());
        }
        // Scale to fill target chassis dims (use the largest ratio to fill, not shrink)
        var targetLength = cd.d; // Z = forward
        var targetWidth = cd.w;  // X = side
        var targetHeight = cd.h; // Y = up
        var scaleByLength = targetLength / Math.max(size.z, 0.01);
        var scaleByWidth = targetWidth / Math.max(size.x, 0.01);
        var scaleByHeight = targetHeight / Math.max(size.y, 0.01);
        // Use length as primary scale — the chassis should match its Z dimension
        var finalScale = scaleByLength;
        model.scale.multiplyScalar(finalScale);
        // Re-center after scaling
        box.setFromObject(model);
        var center = box.getCenter(new THREE.Vector3());
        model.position.x -= center.x;
        model.position.z -= center.z;
        model.position.y -= box.min.y; // sit on ground
        model.name = 'chassis';
        // Insert at beginning (before wheels/driver)
        vehicleGroup.children.unshift(model);
        model.parent = vehicleGroup;
      }).catch(function() {
        // Fallback: build placeholder chassis
        buildPlaceholderChassisInGroup(cd, chassisType);
      });
    } else {
      buildPlaceholderChassisInGroup(cd, chassisType);
    }

    // Build rest of vehicle (wheels, driver, decos) immediately
    buildVehicleExtras(cd);
  }

  function buildPlaceholderChassisInGroup(cd, chassisType) {
    var chassisGeo = new THREE.BoxGeometry(cd.w, cd.h, cd.d);
    var chassisMat = createToonMaterial(vehicleData.chassis.color, 'soft');
    var chassis = new THREE.Mesh(chassisGeo, chassisMat);
    chassis.position.y = cd.h / 2;
    chassis.castShadow = true;
    chassis.name = 'chassis';
    vehicleGroup.add(chassis);

    if (chassisType === 'rocket') {
      var noseGeo = new THREE.ConeGeometry(cd.d/2, 0.4, 8);
      noseGeo.rotateZ(-Math.PI/2);
      var nose = new THREE.Mesh(noseGeo, chassisMat);
      nose.position.set(0, cd.h/2, -cd.w/2 - 0.15);
      nose.rotation.x = Math.PI/2;
      vehicleGroup.add(nose);
    }
  }

  function buildVehicleExtras(cd) {
    // Wheels
    var wr = WHEEL_RADIUS[vehicleData.wheels.type];
    var wheelGeo = new THREE.CylinderGeometry(wr, wr, 0.12, 16);
    wheelGeo.rotateZ(Math.PI/2);
    var wheelMat = createToonMaterial(vehicleData.wheels.color);
    var positions = CHASSIS_WHEELS[vehicleData.chassis.type];
    for (var i = 0; i < 4; i++) {
      var w = new THREE.Mesh(wheelGeo, wheelMat);
      w.position.set(positions[i].x, wr, positions[i].z);
      vehicleGroup.add(w);
      wheels.push(w);
    }

    // Driver
    var dBody = new THREE.Mesh(new THREE.CylinderGeometry(0.12,0.15,0.3,8), createToonMaterial(0x4488FF));
    dBody.position.y = cd.h + 0.15;
    vehicleGroup.add(dBody);
    var helmet = new THREE.Mesh(new THREE.SphereGeometry(0.14,12,8), createToonMaterial(vehicleData.driver.helmetColor));
    helmet.position.y = cd.h + 0.38;
    helmet.name = 'helmet';
    vehicleGroup.add(helmet);
    var visor = new THREE.Mesh(new THREE.SphereGeometry(0.08,8,6,0,Math.PI), createToonMaterial(0x222222));
    visor.position.set(0, cd.h + 0.37, -0.08);
    visor.rotation.x = -Math.PI*0.15;
    vehicleGroup.add(visor);

    // Decorations
    var decoPoints = CHASSIS_DECOS[vehicleData.chassis.type];
    ['top','side','front','back'].forEach(function(slot) {
      var decoType = vehicleData.decorations[slot];
      if (!decoType) return;
      var deco = buildPlaceholderDeco(slot, decoType);
      var pt = decoPoints[slot];
      deco.position.set(pt.x, pt.y, pt.z);
      deco.name = 'deco_' + slot;
      vehicleGroup.add(deco);
    });

    // Outlines (skip GLB chassis — it gets its own outlines from toonifyModel)
    addOutline(vehicleGroup, 0.035);

    // Contact shadow
    var shadowGeo = new THREE.CircleGeometry(0.7, 16);
    shadowGeo.rotateX(-Math.PI/2);
    var shadowMat = new THREE.MeshBasicMaterial({color:0x000000, transparent:true, opacity:0.15, depthWrite:false});
    var cs = new THREE.Mesh(shadowGeo, shadowMat);
    cs.position.y = 0.01;
    cs.userData.noOutline = true;
    vehicleGroup.add(cs);
  }

  function buildPlayer() {
    assembleVehicle();
    playerGroup.add(vehicleGroup);
    playerGroup.position.set(0, 0, 0);
    scene.add(playerGroup);
  }

  // ===================== LANE SWITCHING =====================
  function switchLane(direction) {
    var newLane = currentLane + direction;
    if (newLane < 0) newLane = 0;
    if (newLane > 2) newLane = 2;
    if (newLane === currentLane) return;
    // Allow interrupting mid-switch — snap current position and start new switch
    currentLane = newLane;
    targetX = LANES[currentLane];
    switchStartTime = performance.now();
    switchStartX = playerX; // start from wherever we are right now
    isSwitching = true;
  }

  function updateLanePosition(now) {
    if (!isSwitching) return;
    var t = (now - switchStartTime) / switchDuration;
    if (t > 1) t = 1;
    // Ease in-out quad
    var eased = t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;
    playerX = switchStartX + (targetX - switchStartX) * eased;
    if (t >= 1) {
      playerX = targetX;
      isSwitching = false;
    }
    playerGroup.position.x = playerX;
  }

  // ===================== OBJECT POOL =====================
  function ObjectPool(createFn, initialSize) {
    this.createFn = createFn;
    this.pool = [];
    for (var i = 0; i < initialSize; i++) {
      var obj = this.createFn();
      obj.visible = false;
      obj.position.set(0, -100, 0);
      this.pool.push(obj);
    }
  }
  ObjectPool.prototype.get = function() {
    for (var i = 0; i < this.pool.length; i++) {
      if (!this.pool[i].visible) {
        return this.pool[i];
      }
    }
    var obj = this.createFn();
    this.pool.push(obj);
    return obj;
  };
  ObjectPool.prototype.returnToPool = function(obj) {
    obj.visible = false;
    obj.position.set(0, -100, 0);
    obj.userData.elevated = false;
    obj.userData.elevatedY = undefined;
  };

  // ===================== OBSTACLES =====================
  var obstaclePool;
  var obstacleTypes = ['barrel', 'cone', 'hay_bale'];

  function createPlaceholderObstacle(type) {
    if (!type) type = obstacleTypes[Math.floor(Math.random() * obstacleTypes.length)];
    var hb = OBSTACLE_HITBOXES[type];
    var group = new THREE.Group();

    if (type === 'ramp') {
      // Bright green wedge — clearly different from obstacles
      var geo = new THREE.BoxGeometry(1.4, 0.5, 1.2);
      var mat = createToonMaterial(0x44DD66);
      var mesh = new THREE.Mesh(geo, mat);
      mesh.position.y = 0.15;
      mesh.rotation.x = 0.3;
      mesh.castShadow = true;
      group.add(mesh);
      // Large yellow arrow on top
      var arrowGeo = new THREE.ConeGeometry(0.25, 0.5, 3);
      arrowGeo.rotateX(-Math.PI/2);
      var arrow = new THREE.Mesh(arrowGeo, createToonMaterial(0xFFDD00));
      arrow.position.set(0, 0.5, -0.25);
      group.add(arrow);
      // Glowing base stripe
      var stripe = new THREE.Mesh(
        new THREE.BoxGeometry(1.4, 0.08, 1.2),
        new THREE.MeshBasicMaterial({ color: 0x88FF88 })
      );
      stripe.position.y = 0.02;
      stripe.userData.noOutline = true;
      group.add(stripe);
    } else if (type === 'pothole') {
      var geo = new THREE.CylinderGeometry(0.5, 0.5, 0.03, 12);
      var mat = createToonMaterial(0x333333);
      var mesh = new THREE.Mesh(geo, mat);
      mesh.position.y = 0.02;
      group.add(mesh);
    } else {
      var geo = new THREE.BoxGeometry(hb.x, hb.y, hb.z);
      var mat = createToonMaterial(OBSTACLE_COLORS[type]);
      var mesh = new THREE.Mesh(geo, mat);
      mesh.position.y = hb.y / 2;
      mesh.castShadow = true;
      group.add(mesh);
    }

    addOutline(group, 0.025);
    group.userData.type = type;
    group.userData.hitbox = hb;
    return group;
  }

  function initObstacles() {
    obstaclePool = new ObjectPool(function() {
      var obj = createPlaceholderObstacle();
      trackGroup.add(obj); // In trackGroup so tilt handles slope — no per-frame Y updates
      return obj;
    }, 20);
  }

  // ===================== COLLECTIBLES =====================
  var coinPool, specialPool;

  function createPlaceholderCoin() {
    var group = new THREE.Group();
    var geo = new THREE.CylinderGeometry(0.2, 0.2, 0.04, 12);
    geo.rotateZ(Math.PI / 2);
    var mat = createToonMaterial(0xFFDD00);
    group.add(new THREE.Mesh(geo, mat));
    addOutline(group, 0.02);
    group.userData.collectType = 'coin';
    return group;
  }

  function createPlaceholderSpecial() {
    var group = new THREE.Group();
    var geo = new THREE.OctahedronGeometry(0.25, 0);
    var mat = createToonMaterial(0xFF44FF);
    group.add(new THREE.Mesh(geo, mat));
    addOutline(group, 0.02);
    group.userData.collectType = 'star';
    return group;
  }

  function initCollectibles() {
    coinPool = new ObjectPool(function() {
      var obj = createPlaceholderCoin();
      trackGroup.add(obj); // In trackGroup so tilt handles slope
      return obj;
    }, 40);
    specialPool = new ObjectPool(function() {
      var obj = createPlaceholderSpecial();
      trackGroup.add(obj); // In trackGroup so tilt handles slope
      return obj;
    }, 10);
  }

  function spawnCoinsForPattern(pattern, z) {
    for (var lane = 0; lane < 3; lane++) {
      if (!pattern[lane] && Math.random() < 0.6) {
        var c = coinPool.get();
        c.position.set(LANES[lane], 0.8, z);
        c.visible = true;
        c.userData.collectType = 'coin';
        activeCollectibles.push(c);
      }
    }
  }

  function spawnSpecialForPattern(pattern, z) {
    if (Math.random() < 0.05) {
      var clearLanes = [];
      for (var lane = 0; lane < 3; lane++) {
        if (!pattern[lane]) clearLanes.push(lane);
      }
      if (clearLanes.length > 0) {
        var chosen = clearLanes[Math.floor(Math.random() * clearLanes.length)];
        var s = specialPool.get();
        var specialType = Math.random() < 0.5 ? 'star' : 'boost';
        s.userData.collectType = specialType;
        s.position.set(LANES[chosen], 1.0, z - 2);
        s.visible = true;
        activeCollectibles.push(s);
      }
    }
  }

  function updateCollectibles(dt, time) {
    for (var i = activeCollectibles.length - 1; i >= 0; i--) {
      var item = activeCollectibles[i];
      item.position.z += scrollSpeed * dt;
      // Spin and bob — Y base set at spawn, no slope recalc (trackGroup handles tilt)
      item.rotation.y = time * 0.003;
      var baseY = item.userData.elevated ? (item.userData.elevatedY || 2.0) : (item.userData.collectType === 'coin' ? 0.8 : 1.0);
      item.position.y = baseY + Math.sin(time * 0.004 + item.position.z) * 0.15;
      // Recycle
      if (item.position.z > 15) {
        if (item.userData.collectType === 'coin') coinPool.returnToPool(item);
        else specialPool.returnToPool(item);
        activeCollectibles.splice(i, 1);
      }
    }
  }

  function checkCollectibles() {
    var pY = 0.4 + playerGroup.position.y;
    var pCenter = new THREE.Vector3(playerX, pY, 0);
    var pBox = new THREE.Box3().setFromCenterAndSize(pCenter, PLAYER_HITBOX);
    for (var i = activeCollectibles.length - 1; i >= 0; i--) {
      var item = activeCollectibles[i];
      if (!item.visible) continue;
      // Get world position (collectibles are in trackGroup)
      item.getWorldPosition(_worldPos);
      if (_worldPos.z < -2 || _worldPos.z > 3) continue;
      var iBox = new THREE.Box3().setFromCenterAndSize(_worldPos, COLLECTIBLE_HITBOX);
      if (pBox.intersectsBox(iBox)) {
        collectItem(item);
        if (item.userData.collectType === 'coin') coinPool.returnToPool(item);
        else specialPool.returnToPool(item);
        activeCollectibles.splice(i, 1);
      }
    }
  }

  function collectItem(item) {
    var type = item.userData.collectType;
    if (type === 'coin') {
      coins++;
      score += 100 * styleMultiplier;
      showFloatingText('+100', item.position, '#FFD700');
      // Bump animation on HUD coin counter
      hudCoins.classList.remove('coin-bump');
      void hudCoins.offsetWidth;
      hudCoins.classList.add('coin-bump');
      flashCoinCollect();
    } else if (type === 'star') {
      score += 500 * styleMultiplier;
      showFloatingText('+500', item.position, '#FF44FF');
    } else if (type === 'boost') {
      isBoosted = true;
      boostEndTime = performance.now() + BOOST_DURATION;
      showFloatingText('BOOST!', item.position, '#44FFFF');
    }
  }

  // ===================== DIFFICULTY MANAGER =====================
  var difficultyManager = {
    baseLevel: 0,
    waveOffset: 0,
    effective: 0,
    wavePhase: 'build',
    waveTimer: 0,

    update: function(dist) {
      this.baseLevel = Math.min(dist / 1200, 1.0);
      var targetOffset = { build: 0.08, peak: 0.20, rest: -0.08 }[this.wavePhase];
      this.waveOffset += (targetOffset - this.waveOffset) * 0.15;
      this.effective = Math.max(0, Math.min(1, this.baseLevel + this.waveOffset));
    },

    onRowSpawned: function() {
      this.waveTimer++;
      var durations = { build: 4, peak: 3, rest: 2 };
      if (this.waveTimer >= durations[this.wavePhase]) {
        this.waveTimer = 0;
        var transitions = { build: 'peak', peak: 'rest', rest: 'build' };
        this.wavePhase = transitions[this.wavePhase];
      }
    },

    getRowGap: function() {
      // Grace period: wider gaps in first 300m, then tighten
      var baseGap = distance < 300 ? 12 : 8;
      var squeeze = distance < 300 ? this.effective * 2 : this.effective * 3.5;
      return baseGap - squeeze;
    },

    getPatternTier: function() {
      if (this.effective < 0.25) return 'easy';
      if (this.effective < 0.55) return 'medium';
      return 'hard';
    },

    isRestPhase: function() { return this.wavePhase === 'rest'; },

    reset: function() {
      this.baseLevel = 0; this.waveOffset = 0; this.effective = 0;
      this.wavePhase = 'build'; this.waveTimer = 0;
    }
  };

  // ===================== SPEED TABLE =====================
  function getTargetSpeed(dist) {
    var keys = SPEED_TABLE_KEYS;
    var lower = 0, upper = 2500;
    for (var i = 0; i < keys.length - 1; i++) {
      if (dist >= keys[i] && dist <= keys[i+1]) { lower = keys[i]; upper = keys[i+1]; break; }
    }
    if (dist > 2000) return SPEED_TABLE[2000] * speedStatMultiplier;
    var t = upper === lower ? 1 : (dist - lower) / (upper - lower);
    return (SPEED_TABLE[lower] + (SPEED_TABLE[upper] - SPEED_TABLE[lower]) * t) * speedStatMultiplier;
  }

  // ===================== FLOATING TEXT =====================
  function showFloatingText(text, worldPos, color) {
    color = color || '#FFD700';
    var el = document.createElement('div');
    el.className = 'float-text';
    el.textContent = text;
    el.style.color = color;
    var screenPos = worldPos.clone().project(camera);
    el.style.left = ((screenPos.x + 1) / 2 * window.innerWidth) + 'px';
    el.style.top = ((-screenPos.y + 1) / 2 * window.innerHeight) + 'px';
    effectsLayer.appendChild(el);
    var startY = parseFloat(el.style.top);
    var opacity = 1;
    function animate() {
      startY -= 1.5;
      opacity -= 0.025;
      el.style.top = startY + 'px';
      el.style.opacity = opacity;
      if (opacity > 0) requestAnimationFrame(animate);
      else el.remove();
    }
    requestAnimationFrame(animate);
  }

  // ===================== MILESTONE BANNERS =====================
  function checkMilestones() {
    var current = Math.floor(distance / 500) * 500;
    if (current > lastMilestone && current > 0) {
      lastMilestone = current;
      showMilestoneBanner(current);
    }
  }

  function showMilestoneBanner(dist) {
    var banner = document.createElement('div');
    banner.className = 'milestone-banner';
    banner.innerHTML = '<div class="milestone-value">' + dist + 'm</div><div class="milestone-label">DOWNHILL!</div>';
    effectsLayer.appendChild(banner);
    setTimeout(function() { banner.remove(); }, 2100);
  }

  // ===================== RAMP JUMP =====================
  function handleRampHit() {
    isJumping = true;
    jumpStartTime = performance.now();
    // Extended jump for elevated events (all-3 ramps)
    if (eventManager.activeEvent && eventManager.activeEvent.isElevated) {
      jumpDuration = 2500;
      jumpHeight = 2.5;
    } else {
      jumpDuration = 1000;
      jumpHeight = 2.0;
    }
  }

  function updateJump(now) {
    if (!isJumping) return;
    var t = (now - jumpStartTime) / jumpDuration;
    if (t >= 1) {
      isJumping = false;
      playerGroup.position.y = 0;
      return;
    }
    playerGroup.position.y = jumpHeight * 4 * t * (1 - t);
  }

  // ===================== SPEED PENALTY =====================
  function applySpeedPenalty() {
    scrollSpeed *= 0.6;
  }

  // ===================== MILESTONE BANNER CUSTOM =====================
  function showMilestoneBannerCustom(text) {
    var banner = document.createElement('div');
    banner.className = 'milestone-banner';
    banner.innerHTML = '<div class="milestone-value">' + text + '</div>';
    effectsLayer.appendChild(banner);
    setTimeout(function() { banner.remove(); }, 2100);
  }

  // ===================== OBSTACLE TYPE VARIETY =====================
  function getAvailableObstacleTypes() {
    var types = ['barrel', 'cone'];
    if (distance > 200) types.push('hay_bale');
    if (distance > 500) types.push('trash_can');
    if (distance > 800) types.push('tire_stack');
    if (distance > 1200) types.push('barrier');
    return types;
  }

  function pickObstacleType() {
    var types = getAvailableObstacleTypes();
    var pick = types[Math.floor(Math.random() * types.length)];
    // Anti-repeat: avoid same type 3x in a row
    if (lastSpawnedTypes.length >= 2 &&
        lastSpawnedTypes[lastSpawnedTypes.length - 1] === pick &&
        lastSpawnedTypes[lastSpawnedTypes.length - 2] === pick) {
      var filtered = types.filter(function(t) { return t !== pick; });
      if (filtered.length > 0) pick = filtered[Math.floor(Math.random() * filtered.length)];
    }
    lastSpawnedTypes.push(pick);
    if (lastSpawnedTypes.length > 3) lastSpawnedTypes.shift();
    return pick;
  }

  // ===================== EVENT MANAGER =====================
  var eventManager = {
    lastEventEnd: 0,
    activeEvent: null,

    update: function(dist) {
      if (this.activeEvent) return true;
      if (dist - this.lastEventEnd < 100) return false;
      if (dist < 80) return false;

      // Ramp events — can trigger anytime
      if (dist > 100 && Math.random() < 0.04) {
        this.startRampEvent();
        return true;
      }
      // Coin bonus — rest phase only
      if (dist > 300 && difficultyManager.isRestPhase() && Math.random() < 0.03) {
        this.startCoinBonusEvent();
        return true;
      }
      // Cheer zone — rest phase only
      if (dist > 250 && difficultyManager.isRestPhase() && Math.random() < 0.02) {
        this.startCheerEvent();
        return true;
      }
      // Elevated — can trigger anytime, high probability
      if (dist > 200 && Math.random() < 0.06) {
        this.startElevatedEvent();
        return true;
      }
      return false;
    },

    startRampEvent: function() {
      var lane = Math.floor(Math.random() * 3);
      var others = [0,1,2].filter(function(l){return l!==lane;});
      this.activeEvent = {
        rows: [
          { dist: 0, pattern: (function(){ var p=[false,false,false]; p[others[0]]=true; return p; })(), type: 'cone' },
          { dist: 8, rampLane: lane },
          { dist: 20, pattern: (function(){ var p=[false,false,false]; p[others[0]]=true; return p; })(), type: 'barrel' }
        ],
        currentRow: 0,
        startDist: distance
      };
    },

    startCoinBonusEvent: function() {
      var rows = [];
      var patterns = [
        [false, true, false],
        [true, false, true],
        [false, true, false]
      ];
      for (var i = 0; i < patterns.length; i++) {
        rows.push({ dist: i * 4, coinPattern: patterns[i] });
      }
      this.activeEvent = { rows: rows, currentRow: 0, startDist: distance };
    },

    startCheerEvent: function() {
      var rows = [];
      for (var i = 0; i < 4; i++) {
        rows.push({ dist: i * 6, coinPattern: [true, true, true], noObstacles: true });
      }
      this.activeEvent = { rows: rows, currentRow: 0, startDist: distance, banner: 'CHEER ZONE!' };
      if (this.activeEvent.banner) {
        showMilestoneBannerCustom(this.activeEvent.banner);
      }
    },

    startElevatedEvent: function() {
      // Ramp up → elevated platform (player jumps and stays high) → coins → ramp down
      var rows = [];
      // All 3 lanes get ramps — player MUST jump
      rows.push({ dist: 0, allRamps: true });
      // While airborne, dense coins at elevated height
      for (var i = 0; i < 6; i++) {
        rows.push({ dist: 4 + i * 3, coinPattern: [true, true, true], elevated: true });
      }
      this.activeEvent = { rows: rows, currentRow: 0, startDist: distance, banner: 'OVERGROUND!', isElevated: true };
      showMilestoneBannerCustom('OVERGROUND!');
    },

    processEvent: function() {
      if (!this.activeEvent) return;
      var ev = this.activeEvent;
      var elapsed = distance - ev.startDist;

      while (ev.currentRow < ev.rows.length) {
        var row = ev.rows[ev.currentRow];
        if (elapsed < row.dist) break;

        if (row.allRamps) {
          // Spawn ramps in all 3 lanes — player must jump
          for (var rl = 0; rl < 3; rl++) {
            var obs = obstaclePool.get();
            var mainMesh = null;
            obs.traverse(function(c) { if (c.isMesh && !c.userData.isOutline) mainMesh = c; });
            if (mainMesh) {
              mainMesh.geometry.dispose();
              mainMesh.geometry = new THREE.BoxGeometry(1.4, 0.5, 1.2);
              mainMesh.material = createToonMaterial(0x44DD66);
              mainMesh.position.set(0, 0.15, 0);
              mainMesh.rotation.set(0.3, 0, 0);
              mainMesh.scale.set(1, 1, 1);
            }
            obs.userData.type = 'ramp';
            obs.userData.hitbox = new THREE.Vector3(1.4, 0.5, 1.2);
            obs.userData.nearMissCounted = false;
            obs.position.set(LANES[rl], 0, -SPAWN_DISTANCE);
            obs.visible = true;
            activeObstacles.push(obs);
          }
          ev.currentRow++;
          continue;
        } else if (row.elevated) {
          // Coins at elevated height (player is in the air from the ramp)
          for (var lane = 0; lane < 3; lane++) {
            if (row.coinPattern && row.coinPattern[lane]) {
              var coin = coinPool.get();
              if (coin) {
                coin.position.set(LANES[lane], 2.0, -SPAWN_DISTANCE);
                coin.visible = true;
                coin.userData.collectType = 'coin';
                coin.userData.elevated = true;
                coin.userData.elevatedY = 2.0;
                activeCollectibles.push(coin);
              }
            }
          }
          ev.currentRow++;
          continue;
        } else if (row.rampLane !== undefined) {
          var obs = obstaclePool.get();
          var mainMesh = null;
          obs.traverse(function(c) { if (c.isMesh && !c.userData.isOutline) mainMesh = c; });
          if (mainMesh) {
            mainMesh.geometry.dispose();
            mainMesh.geometry = new THREE.BoxGeometry(1.4, 0.5, 1.2);
            mainMesh.material = createToonMaterial(0x44DD66);
            mainMesh.position.set(0, 0.15, 0);
            mainMesh.rotation.set(0.3, 0, 0);
            mainMesh.scale.set(1, 1, 1);
          }
          obs.userData.type = 'ramp';
          obs.userData.hitbox = new THREE.Vector3(1.4, 0.5, 1.2);
          obs.userData.nearMissCounted = false;
          obs.position.set(LANES[row.rampLane], 0, -SPAWN_DISTANCE);
          obs.rotation.set(0, 0, 0);
          obs.visible = true;
          activeObstacles.push(obs);
          for (var ci = 0; ci < 6; ci++) {
            var coin = coinPool.get();
            if (coin) {
              var rampCoinY = 1.2 + Math.sin(ci / 5 * Math.PI) * 1.0;
              coin.position.set(LANES[row.rampLane], rampCoinY, -SPAWN_DISTANCE - 3 - ci * 1.5);
              coin.visible = true;
              coin.userData.collectType = 'coin';
              coin.userData.elevated = true;
              coin.userData.elevatedY = rampCoinY;
              activeCollectibles.push(coin);
            }
          }
        } else if (row.coinPattern) {
          for (var lane = 0; lane < 3; lane++) {
            if (row.coinPattern[lane]) {
              var coin = coinPool.get();
              if (coin) {
                coin.position.set(LANES[lane], 0.8, -SPAWN_DISTANCE);
                coin.visible = true;
                coin.userData.collectType = 'coin';
                activeCollectibles.push(coin);
              }
            }
          }
        } else if (row.pattern) {
          for (var lane = 0; lane < 3; lane++) {
            if (row.pattern[lane]) {
              var obs = obstaclePool.get();
              var type = row.type || 'cone';
              var hb = OBSTACLE_HITBOXES[type] || OBSTACLE_HITBOXES.barrel;
              var mainMesh = null;
              obs.traverse(function(c) { if (c.isMesh && !c.userData.isOutline) mainMesh = c; });
              if (mainMesh) {
                mainMesh.geometry.dispose();
                mainMesh.geometry = new THREE.BoxGeometry(hb.x, hb.y, hb.z);
                mainMesh.material = createToonMaterial(OBSTACLE_COLORS[type] || 0xFF6633);
                mainMesh.position.set(0, hb.y / 2, 0);
                mainMesh.rotation.set(0, 0, 0);
                mainMesh.scale.set(1, 1, 1);
              }
              obs.traverse(function(c) { c.rotation.set(0, 0, 0); });
              obs.userData.type = type;
              obs.userData.hitbox = hb;
              obs.userData.nearMissCounted = false;
              obs.position.set(LANES[lane], 0, -SPAWN_DISTANCE);
              obs.visible = true;
              activeObstacles.push(obs);
            }
          }
        }
        ev.currentRow++;
      }

      if (ev.currentRow >= ev.rows.length) {
        this.lastEventEnd = distance;
        this.activeEvent = null;
      }
    },

    reset: function() {
      this.lastEventEnd = 0;
      this.activeEvent = null;
    }
  };

  // ===================== ENVIRONMENT ZONES =====================
  var ENVIRONMENT_ZONES = [
    { name:'suburban',    maxDist:500,  road:0x2A2A3E, ground:0x888899, fog:0x997788 },
    { name:'urban',       maxDist:1000, road:0x222233, ground:0x777788, fog:0x887799 },
    { name:'park',        maxDist:1500, road:0x2A3A2A, ground:0x779977, fog:0x889977 },
    { name:'industrial',  maxDist:2000, road:0x2A2A2A, ground:0x666677, fog:0x776688 },
    { name:'sunset',      maxDist:99999, road:0x332233, ground:0x887766, fog:0xAA7755 }
  ];
  var currentZone = null;

  function updateEnvironmentZone() {
    var zone = null;
    for (var i = 0; i < ENVIRONMENT_ZONES.length; i++) {
      if (distance < ENVIRONMENT_ZONES[i].maxDist) { zone = ENVIRONMENT_ZONES[i]; break; }
    }
    if (!zone) zone = ENVIRONMENT_ZONES[ENVIRONMENT_ZONES.length - 1];
    if (zone === currentZone) return;
    currentZone = zone;

    // Keep city skyline texture — only update fog color
    scene.fog.color.set(zone.fog);

    for (var i = 0; i < segmentPool.length; i++) {
      var seg = segmentPool[i];
      seg.children.forEach(function(child) {
        if (!child.isMesh) return;
        if (child.material && child.material.color) {
          if (child.geometry && child.geometry.parameters) {
            var w = child.geometry.parameters.width;
            if (w === ROAD_WIDTH) child.material.color.set(zone.road);
            else if (Math.abs(w - 2.0) < 0.1) child.material.color.set(zone.ground);
          }
        }
      });
    }
  }

  // ===================== ROADSIDE SCENERY =====================
  var sceneryPool = [];
  var activeScenery = [];
  var SCENERY_X_LEFT = -(ROAD_WIDTH / 2 + 1.0);
  var SCENERY_X_RIGHT = ROAD_WIDTH / 2 + 1.0;

  function createPlaceholderScenery() {
    var group = new THREE.Group();
    var r = Math.random();

    if (r < 0.35) {
      var trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.08,0.12,1.0,6), createToonMaterial(0x8B6914));
      trunk.position.y = 0.5;
      group.add(trunk);
      var canopy = new THREE.Mesh(new THREE.SphereGeometry(0.5,8,6), createToonMaterial(0x33FF66));
      canopy.position.y = 1.3;
      group.add(canopy);
    } else if (r < 0.55) {
      var bush = new THREE.Mesh(new THREE.SphereGeometry(0.35,6,5), createToonMaterial(0x22CC55));
      bush.position.y = 0.25;
      bush.scale.y = 0.7;
      group.add(bush);
    } else if (r < 0.7) {
      var pole = new THREE.Mesh(new THREE.CylinderGeometry(0.03,0.04,2.2,6), createToonMaterial(0x444444));
      pole.position.y = 1.1;
      group.add(pole);
      var lamp = new THREE.Mesh(new THREE.SphereGeometry(0.1,8,6), createToonMaterial(0xFFDD44));
      lamp.position.y = 2.3;
      group.add(lamp);
    } else if (r < 0.85) {
      var w = 1.5 + Math.random() * 1.5;
      var h = 1.5 + Math.random() * 2;
      var colors = [0xFF3377, 0x22DDCC, 0x8844FF, 0xFF6622];
      var building = new THREE.Mesh(
        new THREE.BoxGeometry(w, h, 1.5),
        createToonMaterial(colors[Math.floor(Math.random() * colors.length)])
      );
      building.position.y = h / 2;
      building.castShadow = true;
      group.add(building);
    } else {
      var fence = new THREE.Mesh(new THREE.BoxGeometry(2, 0.7, 0.06), createToonMaterial(0xCCCCDD));
      fence.position.y = 0.35;
      group.add(fence);
    }

    addOutline(group, 0.015);
    return group;
  }

  function getOrCreateScenery() {
    for (var i = 0; i < sceneryPool.length; i++) {
      if (!sceneryPool[i].visible) return sceneryPool[i];
    }
    var s = createPlaceholderScenery();
    sceneryPool.push(s);
    scene.add(s);
    return s;
  }

  function spawnSceneryForZ(z) {
    if (Math.random() < 0.15) {
      var s = getOrCreateScenery();
      s.position.set(SCENERY_X_LEFT + (Math.random()-0.5)*2, 0, z + (Math.random()-0.5) * SEGMENT_LENGTH * 0.8);
      s.rotation.y = Math.random() * Math.PI * 2;
      s.visible = true;
      activeScenery.push(s);
    }
    if (Math.random() < 0.15) {
      var s = getOrCreateScenery();
      s.position.set(SCENERY_X_RIGHT + (Math.random()-0.5)*2, 0, z + (Math.random()-0.5) * SEGMENT_LENGTH * 0.8);
      s.rotation.y = Math.random() * Math.PI * 2;
      s.visible = true;
      activeScenery.push(s);
    }
  }

  function updateScenery(dt) {
    for (var i = activeScenery.length - 1; i >= 0; i--) {
      activeScenery[i].position.z += scrollSpeed * dt;
      if (activeScenery[i].position.z > 20) {
        activeScenery[i].visible = false;
        activeScenery.splice(i, 1);
      }
    }
  }

  // ===================== NEAR-MISS DETECTION =====================
  function checkNearMisses() {
    var playerHalfW = PLAYER_HITBOX.x / 2;
    var playerLeft = playerX - playerHalfW;
    var playerRight = playerX + playerHalfW;

    for (var i = 0; i < activeObstacles.length; i++) {
      var obs = activeObstacles[i];
      if (!obs.visible || obs.userData.nearMissCounted) continue;
      if (obs.position.z < -0.5 || obs.position.z > 1.5) continue;

      var hb = obs.userData.hitbox;
      var obsHalfW = hb.x / 2;
      var obsLeft = obs.position.x - obsHalfW;
      var obsRight = obs.position.x + obsHalfW;

      // Check lateral gap
      var gapLeft = playerLeft - obsRight;
      var gapRight = obsLeft - playerRight;
      var gap = Math.max(gapLeft, gapRight);

      if (gap > 0 && gap < 0.3) {
        nearMisses++;
        score += 50 * styleMultiplier;
        showFloatingText('CLOSE!', new THREE.Vector3(obs.position.x, 1.5, obs.position.z), '#FF8800');
        obs.userData.nearMissCounted = true;
      }
    }
  }

  // ===================== HIGH SCORE =====================
  function saveHighScore(newScore) {
    var current = parseInt(localStorage.getItem('soapbox:highscore') || '0');
    if (newScore > current) {
      localStorage.setItem('soapbox:highscore', newScore.toString());
      return true;
    }
    return false;
  }
  function getHighScore() {
    return parseInt(localStorage.getItem('soapbox:highscore') || '0');
  }
  function saveTotalCoins(add) {
    var current = parseInt(localStorage.getItem('soapbox:total-coins') || '0');
    localStorage.setItem('soapbox:total-coins', (current + add).toString());
  }

  // ===================== HUD SPEED =====================
  function updateHUDSpeed() {
    var maxSpeed = SPEED_TABLE[2000] * BOOST_MULTIPLIER;
    var pct = Math.min(scrollSpeed / maxSpeed * 100, 100);
    speedFill.style.width = pct + '%';
  }

  // ===================== COUNT-UP ANIMATION =====================
  function animateCountUp(elementId, from, to, duration) {
    var el = document.getElementById(elementId);
    if (!el) return;
    var start = performance.now();
    function step(now) {
      var t = Math.min((now - start) / duration, 1);
      el.textContent = Math.floor(from + (to - from) * t);
      if (t < 1) requestAnimationFrame(step);
    }
    requestAnimationFrame(step);
  }

  var lastSpawnedPattern = [false, false, false];

  function spawnObstacleRow(pattern, z) {
    pattern = pattern.slice(); // always work on a copy

    // SAFETY 1: never block all 3 lanes in a single row
    var clearCount = pattern.filter(function(v) { return !v; }).length;
    if (clearCount === 0) {
      pattern[Math.floor(Math.random() * 3)] = false;
    }

    // SAFETY 2: the UNION of this row + previous row must not cover all 3 lanes
    // (player must be able to survive by staying in or switching to at least one lane)
    var allCovered = true;
    for (var c = 0; c < 3; c++) {
      if (!pattern[c] && !lastSpawnedPattern[c]) { allCovered = false; break; }
    }
    if (allCovered) {
      // Find a lane that's blocked in THIS row but clear in the previous
      // If none exists, find any blocked lane and clear it
      var cleared = false;
      for (var c = 0; c < 3; c++) {
        if (pattern[c] && !lastSpawnedPattern[c]) { pattern[c] = false; cleared = true; break; }
      }
      if (!cleared) {
        // Force clear the lane that was clear in the previous row, or any lane
        for (var c = 0; c < 3; c++) {
          if (pattern[c]) { pattern[c] = false; break; }
        }
      }
    }

    // HARD SAFETY: check actual obstacles near spawn point
    var lanesNearby = [false, false, false];
    for (var ai = 0; ai < activeObstacles.length; ai++) {
      var ao = activeObstacles[ai];
      if (Math.abs(ao.position.z - z) < 5) {
        for (var li = 0; li < 3; li++) {
          if (Math.abs(ao.position.x - LANES[li]) < 0.5) { lanesNearby[li] = true; break; }
        }
      }
    }
    var allBlocked = (pattern[0] || lanesNearby[0]) && (pattern[1] || lanesNearby[1]) && (pattern[2] || lanesNearby[2]);
    if (allBlocked) {
      for (var c = 0; c < 3; c++) {
        if (pattern[c] && !lanesNearby[c]) { pattern[c] = false; break; }
      }
      if (pattern[0] && pattern[1] && pattern[2]) pattern[Math.floor(Math.random() * 3)] = false;
    }

    lastSpawnedPattern = pattern.slice();

    for (var lane = 0; lane < 3; lane++) {
      if (pattern[lane]) {
        var obs = obstaclePool.get();
        var type = pickObstacleType();
        var hb = OBSTACLE_HITBOXES[type];
        var mainMesh = null;
        obs.traverse(function(c) {
          if (c.isMesh && !c.userData.isOutline) {
            mainMesh = c;
          }
        });
        if (mainMesh) {
          mainMesh.geometry.dispose();
          mainMesh.geometry = new THREE.BoxGeometry(hb.x, hb.y, hb.z);
          mainMesh.material = createToonMaterial(OBSTACLE_COLORS[type]);
          mainMesh.position.set(0, hb.y / 2, 0);
          mainMesh.rotation.set(0, 0, 0);
          mainMesh.scale.set(1, 1, 1);
        }
        // Reset all children rotations (outlines etc)
        obs.traverse(function(c) { c.rotation.set(0, 0, 0); });
        obs.userData.type = type;
        obs.userData.hitbox = hb;
        obs.userData.nearMissCounted = false;
        obs.position.set(LANES[lane], 0, z);
        obs.visible = true;
        activeObstacles.push(obs);
      }
    }
    spawnCoinsForPattern(pattern, z);
    spawnSpecialForPattern(pattern, z);
    difficultyManager.onRowSpawned();
  }

  function spawnObstacles(dt) {
    // Event manager takes priority
    if (eventManager.activeEvent) {
      eventManager.processEvent();
      return;
    }
    if (eventManager.update(distance)) {
      eventManager.processEvent();
      return;
    }

    // Handle queued sequence rows
    if (sequenceQueue.length > 0) {
      distanceSinceLastSpawn += scrollSpeed * dt;
      var next = sequenceQueue[0];
      if (distanceSinceLastSpawn >= next.gap) {
        distanceSinceLastSpawn = 0;
        spawnObstacleRow(next.pattern, -SPAWN_DISTANCE);
        sequenceQueue.shift();
      }
      return;
    }

    // Grace period: ~2 seconds with no obstacles
    if (distance < 20) return;

    distanceSinceLastSpawn += scrollSpeed * dt;
    var rowGap = difficultyManager.getRowGap();
    if (distanceSinceLastSpawn < rowGap) return;
    distanceSinceLastSpawn = 0;

    // Rest valley: more coin-only rows
    if (difficultyManager.isRestPhase() && Math.random() < 0.4) {
      for (var ci = 0; ci < 3; ci++) {
        var coin = coinPool.get();
        if (coin) {
          coin.position.set(LANES[ci], 0.8, -SPAWN_DISTANCE);
          coin.visible = true;
          coin.userData.collectType = 'coin';
          activeCollectibles.push(coin);
        }
      }
      difficultyManager.onRowSpawned();
      return;
    }

    var tier = difficultyManager.getPatternTier();
    var r = Math.random();
    var pattern;

    if (tier === 'easy') {
      // First 200m: almost all singles. After that, mix in doubles
      var easyThreshold = distance < 200 ? 0.85 : 0.55;
      if (r < easyThreshold) pattern = PATTERNS_EASY[Math.floor(Math.random() * PATTERNS_EASY.length)];
      else pattern = PATTERNS_MEDIUM[Math.floor(Math.random() * PATTERNS_MEDIUM.length)];
    } else if (tier === 'medium') {
      if (r < 0.35) pattern = PATTERNS_EASY[Math.floor(Math.random() * PATTERNS_EASY.length)];
      else if (r < 0.80) pattern = PATTERNS_MEDIUM[Math.floor(Math.random() * PATTERNS_MEDIUM.length)];
      else {
        // Sequence
        var seq = PATTERNS_SEQUENCE[Math.floor(Math.random() * PATTERNS_SEQUENCE.length)];
        spawnObstacleRow(seq.rows[0], -SPAWN_DISTANCE);
        for (var si = 1; si < seq.rows.length; si++) {
          sequenceQueue.push({ pattern: seq.rows[si], gap: seq.gap * difficultyManager.getRowGap() * 0.7 });
        }
        return;
      }
    } else {
      // hard
      if (r < 0.10) pattern = PATTERNS_EASY[Math.floor(Math.random() * PATTERNS_EASY.length)];
      else if (r < 0.50) pattern = PATTERNS_MEDIUM[Math.floor(Math.random() * PATTERNS_MEDIUM.length)];
      else {
        var seq = PATTERNS_SEQUENCE[Math.floor(Math.random() * PATTERNS_SEQUENCE.length)];
        spawnObstacleRow(seq.rows[0], -SPAWN_DISTANCE);
        for (var si = 1; si < seq.rows.length; si++) {
          sequenceQueue.push({ pattern: seq.rows[si], gap: seq.gap * difficultyManager.getRowGap() * 0.7 });
        }
        return;
      }
    }

    spawnObstacleRow(pattern, -SPAWN_DISTANCE);
  }

  function updateObstacles(dt) {
    for (var i = activeObstacles.length - 1; i >= 0; i--) {
      var obs = activeObstacles[i];
      obs.position.z += scrollSpeed * dt;
      // Y is set once at spawn — NEVER updated per frame
      if (obs.position.z > 15) {
        obstaclePool.returnToPool(obs);
        activeObstacles.splice(i, 1);
      }
    }
  }

  // ===================== COLLISION =====================
  var playerBox = new THREE.Box3();
  var obsBox = new THREE.Box3();

  var _worldPos = new THREE.Vector3();
  function checkCollisions() {
    if (isJumping && playerGroup.position.y > 0.5) return;

    var pY = 0.4 + playerGroup.position.y;
    var center = new THREE.Vector3(playerX, pY, 0);
    playerBox.setFromCenterAndSize(center, PLAYER_HITBOX);

    for (var i = 0; i < activeObstacles.length; i++) {
      var obs = activeObstacles[i];
      if (!obs.visible) continue;
      // Get world position (obstacles are in trackGroup)
      obs.getWorldPosition(_worldPos);
      if (_worldPos.z < -2 || _worldPos.z > 3) continue;
      var hb = obs.userData.hitbox;
      var obsCenter = new THREE.Vector3(_worldPos.x, _worldPos.y + hb.y / 2, _worldPos.z);
      obsBox.setFromCenterAndSize(obsCenter, hb);
      if (playerBox.intersectsBox(obsBox)) {
        if (obs.userData.type === 'ramp') {
          handleRampHit();
          obs.visible = false;
          return;
        }
        if (obs.userData.type === 'pothole') {
          applySpeedPenalty();
          showFloatingText('SLOW!', obs.position.clone(), '#FF4444');
          obs.visible = false;
          return;
        }
        transition('gameover');
        return;
      }
    }
  }

  // ===================== CAMERA =====================
  function updateCamera() {
    var tx = playerX * 0.3;
    var bob = Math.sin(distance * 0.8) * 0.04;
    // Higher camera, steeper downhill angle
    var target = new THREE.Vector3(tx, 4.0 + bob, 4.5);
    camera.position.lerp(target, 0.08);
    // Look further down and ahead for dramatic downhill perspective
    camera.lookAt(playerX * 0.2, -0.8, -10);
  }

  // ===================== SPEED & SCORE =====================
  function updateSpeed(dt) {
    var now = performance.now();
    var targetSpeed = getTargetSpeed(distance);
    if (isBoosted) {
      if (now >= boostEndTime) {
        isBoosted = false;
      } else {
        targetSpeed *= BOOST_MULTIPLIER;
      }
    }
    var accelRate = difficultyManager.isRestPhase() ? 0.3 : 0.8;
    if (scrollSpeed < targetSpeed) {
      scrollSpeed = Math.min(scrollSpeed + accelRate * dt, targetSpeed);
    } else {
      // Ease back down (e.g. after boost ends)
      scrollSpeed += (targetSpeed - scrollSpeed) * 0.05;
    }
  }

  function updateScore(dt) {
    score += scrollSpeed * dt * 10;
    distance += scrollSpeed * dt;
  }

  function updateHUD() {
    hudDistance.textContent = '\u{1F3C1} ' + Math.floor(distance) + ' m';
    hudScore.textContent = '\u2B50 ' + Math.floor(score);
    hudCoins.textContent = '\u{1FA99} ' + coins;
  }

  // ===================== STATE MACHINE =====================
  var countdownPhase = 0;
  var cameraShakeIntensity = 0;

  function transition(newState) {
    gameState = newState;
    if (newState === 'countdown') {
      countdownStartTime = performance.now();
      countdownPhase = 0;
      countdownOverlay.style.display = 'flex';
      gameoverOverlay.style.display = 'none';
      hudEl.style.display = 'flex';
      hudSpeed.style.display = 'block';
      hudMultiplier.style.display = 'block';
      hudMultiplier.textContent = 'x' + styleMultiplier.toFixed(2);
      showCountdownNumber('3', false);
      camera.position.set(3, 5, 8);
      camera.fov = 45;
      camera.updateProjectionMatrix();
      hideVisualOverlays();
    } else if (newState === 'racing') {
      countdownOverlay.style.display = 'none';
      camera.fov = 60;
      camera.updateProjectionMatrix();
      showRacingOverlays();
    } else if (newState === 'gameover') {
      gameoverTime = performance.now();
      cameraShakeIntensity = 0.15;
      gameoverShown = false;
      // Tilt vehicle
      vehicleGroup.rotation.z = 0.3;
      vehicleGroup.rotation.x = -0.15;
      // Phase 6: DOM screen shake + hide racing overlays
      shakeScreen(10, 500);
      hideVisualOverlays();
    }
  }

  function showCountdownNumber(text, isGo) {
    countdownText.className = isGo ? 'go' : '';
    countdownText.textContent = text;
    // Re-trigger animation
    countdownText.style.animation = 'none';
    countdownText.offsetHeight; // force reflow
    countdownText.style.animation = 'countdownPop 0.7s ease-out forwards';
  }

  function updateCountdown(now) {
    var elapsed = now - countdownStartTime;
    var t = elapsed / 3500; // 3.5s total

    // Camera lerp from (3,5,8) to (0,3,5.5)
    var startCam = new THREE.Vector3(3, 5, 8);
    var endCam = new THREE.Vector3(0, 3, 5.5);
    var lerpT = Math.min(t / 1.0, 1.0); // complete in first ~3.5s
    camera.position.lerpVectors(startCam, endCam, lerpT);
    camera.lookAt(0, 0.5, -8);
    // Phase 6: FOV zoom from 45 (wide establishing) to 60 (race view)
    camera.fov = 45 + (60 - 45) * lerpT;
    camera.updateProjectionMatrix();

    // Show numbers
    if (elapsed < 1000 && countdownPhase === 0) {
      // Already showing 3
    } else if (elapsed >= 1000 && countdownPhase === 0) {
      countdownPhase = 1;
      showCountdownNumber('2', false);
    } else if (elapsed >= 2000 && countdownPhase === 1) {
      countdownPhase = 2;
      showCountdownNumber('1', false);
    } else if (elapsed >= 3000 && countdownPhase === 2) {
      countdownPhase = 3;
      showCountdownNumber('GO!', true);
    } else if (elapsed >= 3500 && countdownPhase === 3) {
      transition('racing');
    }
  }

  function updateGameover(now) {
    // Camera shake (decaying)
    var elapsed = (now - gameoverTime) / 1000;
    if (cameraShakeIntensity > 0.001) {
      cameraShakeIntensity *= 0.93;
      camera.position.x += (Math.random() - 0.5) * cameraShakeIntensity;
      camera.position.y += (Math.random() - 0.5) * cameraShakeIntensity * 0.5;
    }

    // Show UI after 0.8s
    if (!gameoverShown && elapsed > 0.8) {
      gameoverShown = true;
      var finalScore = Math.floor(score);
      goDistance.textContent = Math.floor(distance) + ' m';
      goCoins.textContent = coins;
      goNearMisses.textContent = nearMisses;
      goStyle.textContent = 'x' + styleMultiplier.toFixed(2);
      var isNew = saveHighScore(finalScore);
      saveTotalCoins(coins);
      goHighscore.textContent = getHighScore();
      if (isNew) {
        goHighscoreBadge.style.display = 'block';
      } else {
        goHighscoreBadge.style.display = 'none';
      }
      goScore.textContent = '0';
      gameoverOverlay.style.display = 'flex';
      animateCountUp('go-score', 0, finalScore, 1200);
    }
  }

  // ===================== RESTART =====================
  window.restartGame = function() {
    applyVehicleStats();
    score = 0;
    distance = 0;
    coins = 0;
    nearMisses = 0;
    isBoosted = false;
    boostEndTime = 0;
    lastMilestone = 0;
    sequenceQueue = [];
    lastSpawnedPattern = [false, false, false];
    scrollSpeed = getTargetSpeed(0) * 0.8;
    currentLane = 1;
    playerX = 0;
    targetX = 0;
    isSwitching = false;
    distanceSinceLastSpawn = 0;

    difficultyManager.reset();
    isJumping = false;
    eventManager.reset();
    currentZone = null;
    frameCounter = 0;
    lastSpawnedTypes = [];

    // Reset vehicle
    vehicleGroup.rotation.set(0, 0, 0);
    playerGroup.position.set(0, 0, 0);

    // Return all obstacles
    for (var i = activeObstacles.length - 1; i >= 0; i--) {
      obstaclePool.returnToPool(activeObstacles[i]);
    }
    activeObstacles = [];

    // Return all collectibles
    for (var i = activeCollectibles.length - 1; i >= 0; i--) {
      var c = activeCollectibles[i];
      if (c.userData.collectType === 'coin') coinPool.returnToPool(c);
      else specialPool.returnToPool(c);
    }
    activeCollectibles = [];

    // Clear scenery
    for (var i = 0; i < activeScenery.length; i++) {
      activeScenery[i].visible = false;
    }
    activeScenery = [];

    // Clear effects layer
    effectsLayer.innerHTML = '';

    // Reset track
    for (var i = 0; i < segmentPool.length; i++) {
      segmentPool[i].position.z = -i * SEGMENT_LENGTH;
    }

    // Hide overlays
    document.getElementById('screen-title').style.display = 'none';
    document.getElementById('screen-garage').style.display = 'none';
    gameoverOverlay.style.display = 'none';

    // Show track segments
    for (var i = 0; i < segmentPool.length; i++) {
      segmentPool[i].visible = true;
    }

    camera.fov = 60;
    camera.updateProjectionMatrix();

    setupRaceLighting();
    currentMode = 'race';
    transition('countdown');
  };

  // ===================== FLOW FUNCTIONS =====================
  window.startFromTitle = function() {
    document.getElementById('screen-title').style.display = 'none';
    showGarage();
  };

  window.togglePause = function() {
    if (gameState !== 'racing' && !isPaused) return;
    if (isPaused) window.resumeGame();
    else window.pauseGame();
  };

  window.pauseGame = function() {
    isPaused = true;
    document.getElementById('screen-pause').style.display = 'flex';
  };

  window.resumeGame = function() {
    isPaused = false;
    lastTime = performance.now();
    document.getElementById('screen-pause').style.display = 'none';
  };

  window.quitToTitle = function() {
    isPaused = false;
    document.getElementById('screen-pause').style.display = 'none';
    document.getElementById('screen-garage').style.display = 'none';
    gameoverOverlay.style.display = 'none';
    hudEl.style.display = 'none';
    hudSpeed.style.display = 'none';
    hudMultiplier.style.display = 'none';
    countdownOverlay.style.display = 'none';

    // Reset game state
    score = 0;
    distance = 0;
    coins = 0;
    nearMisses = 0;
    styleMultiplier = 1.0;
    isBoosted = false;
    boostEndTime = 0;
    lastMilestone = 0;
    sequenceQueue = [];
    lastSpawnedPattern = [false, false, false];
    scrollSpeed = getTargetSpeed(0) * 0.8;
    currentLane = 1;
    playerX = 0;
    targetX = 0;
    isSwitching = false;
    distanceSinceLastSpawn = 0;
    difficultyManager.reset();
    isJumping = false;
    eventManager.reset();
    currentZone = null;
    frameCounter = 0;
    lastSpawnedTypes = [];

    // Reset vehicle
    vehicleGroup.rotation.set(0, 0, 0);
    playerGroup.position.set(0, 0, 0);

    // Return all obstacles
    for (var i = activeObstacles.length - 1; i >= 0; i--) {
      obstaclePool.returnToPool(activeObstacles[i]);
    }
    activeObstacles = [];

    // Return all collectibles
    for (var i = activeCollectibles.length - 1; i >= 0; i--) {
      var c = activeCollectibles[i];
      if (c.userData.collectType === 'coin') coinPool.returnToPool(c);
      else specialPool.returnToPool(c);
    }
    activeCollectibles = [];

    // Clear scenery
    for (var i = 0; i < activeScenery.length; i++) {
      activeScenery[i].visible = false;
    }
    activeScenery = [];

    // Clear effects layer
    effectsLayer.innerHTML = '';

    // Reset track
    for (var i = 0; i < segmentPool.length; i++) {
      segmentPool[i].position.z = -i * SEGMENT_LENGTH;
      segmentPool[i].visible = true;
    }

    camera.fov = 60;
    camera.updateProjectionMatrix();
    hideVisualOverlays();

    gameState = 'title';
    currentMode = 'title';

    // Show title
    document.getElementById('screen-title').style.display = 'flex';
    document.getElementById('title-highscore').textContent = getHighScore().toLocaleString();
    document.getElementById('title-coins').textContent = (parseInt(localStorage.getItem('soapbox:total-coins') || '0')).toLocaleString();

    setupTitleLighting();
    camera.position.set(2.5, 2, 3.5);
    camera.lookAt(0, 0.3, 0);
  };

  // ===================== VEHICLE STATS APPLICATION =====================
  function applyVehicleStats() {
    var stats = calculateStats(vehicleData);
    switchDuration = 350 - (stats.hdl - 1) * 50;
    styleMultiplier = 1.0 + (stats.sty - 1) * 0.25;
    speedStatMultiplier = 0.9 + (stats.spd - 1) * 0.05;
  }

  // ===================== GARAGE =====================
  var garageDragging = false;
  var garageDragStartX = 0;
  var garageRotationStart = 0;
  var garageActiveTab = 'chassis';

  var GARAGE_CATALOG = {
    chassis: ['bathtub','rocket','shoe','box','banana','couch'],
    wheels: ['chunky','skinny','monster','wagon','roller'],
    top: ['none','flag','antenna','propeller','crown','fin'],
    side: ['none','sticker','stripe','flame','number','lightning'],
    front: ['none','bumper','teeth','eyes','headlight','horn'],
    back: ['none','exhaust','parachute','tailflag','jetpack'],
    helmet: ['classic','viking','astronaut','mohawk','openface']
  };

  function updateGarageStats() {
    var stats = calculateStats(vehicleData);
    var bars = ['spd','hdl','sty'];
    bars.forEach(function(key) {
      var el = document.getElementById('garage-stat-' + key);
      if (!el) return;
      var html = '';
      for (var i = 1; i <= 5; i++) {
        html += '<div style="width:20px;height:12px;margin-right:2px;display:inline-block;border-radius:2px;background:' + (i <= stats[key] ? (key === 'spd' ? '#FF3344' : key === 'hdl' ? '#4488FF' : '#FFD700') : 'rgba(255,255,255,0.15)') + ';"></div>';
      }
      el.innerHTML = html;
    });
  }

  function updateGaragePartGrid() {
    var grid = document.getElementById('garage-part-grid');
    if (!grid) return;
    var items = GARAGE_CATALOG[garageActiveTab];
    var html = '';
    items.forEach(function(item) {
      var selected = false;
      if (garageActiveTab === 'chassis') selected = vehicleData.chassis.type === item;
      else if (garageActiveTab === 'wheels') selected = vehicleData.wheels.type === item;
      else if (garageActiveTab === 'helmet') selected = vehicleData.driver.helmet === item;
      else {
        var current = vehicleData.decorations[garageActiveTab];
        selected = (item === 'none' && !current) || current === item;
      }
      html += '<button onclick="garageSelectPart(\'' + item + '\')" style="padding:8px 12px;margin:4px;border-radius:8px;border:2px solid ' + (selected ? '#FFD700' : 'rgba(255,255,255,0.2)') + ';background:' + (selected ? 'rgba(255,215,0,0.2)' : 'rgba(255,255,255,0.08)') + ';color:white;font-family:var(--font-body);font-size:13px;cursor:pointer;text-transform:capitalize;">' + item + '</button>';
    });
    grid.innerHTML = html;

    // Color picker visibility
    var colorPicker = document.getElementById('garage-color-picker');
    if (colorPicker) {
      colorPicker.style.display = (garageActiveTab === 'chassis' || garageActiveTab === 'helmet') ? 'flex' : 'none';
    }
  }

  function updateGarageColorPicker() {
    var container = document.getElementById('garage-color-swatches');
    if (!container) return;
    var currentColor = garageActiveTab === 'helmet' ? vehicleData.driver.helmetColor : vehicleData.chassis.color;
    var html = '';
    VEHICLE_COLORS.forEach(function(c) {
      var sel = c.toLowerCase() === currentColor.toLowerCase();
      html += '<div onclick="garageSelectColor(\'' + c + '\')" style="width:28px;height:28px;border-radius:50%;background:' + c + ';cursor:pointer;border:3px solid ' + (sel ? '#FFD700' : 'transparent') + ';box-shadow:' + (sel ? '0 0 8px rgba(255,215,0,0.5)' : 'none') + ';"></div>';
    });
    container.innerHTML = html;
  }

  window.garageSelectTab = function(tab) {
    garageActiveTab = tab;
    // Update tab highlights
    var tabs = document.querySelectorAll('.garage-tab');
    tabs.forEach(function(t) {
      t.style.background = t.dataset.tab === tab ? 'rgba(255,215,0,0.3)' : 'rgba(255,255,255,0.08)';
      t.style.borderColor = t.dataset.tab === tab ? '#FFD700' : 'rgba(255,255,255,0.2)';
    });
    updateGaragePartGrid();
    updateGarageColorPicker();
  };

  window.garageSelectPart = function(item) {
    if (garageActiveTab === 'chassis') {
      vehicleData.chassis.type = item;
    } else if (garageActiveTab === 'wheels') {
      vehicleData.wheels.type = item;
    } else if (garageActiveTab === 'helmet') {
      vehicleData.driver.helmet = item;
    } else {
      vehicleData.decorations[garageActiveTab] = (item === 'none') ? null : item;
    }
    assembleVehicle();
    updateGaragePartGrid();
    updateGarageStats();
    saveVehicleDebounced();
  };

  window.garageSetName = function(name) {
    vehicleData.name = name;
    saveVehicleDebounced();
  };

  window.garageSelectColor = function(color) {
    if (garageActiveTab === 'helmet') {
      vehicleData.driver.helmetColor = color;
    } else {
      vehicleData.chassis.color = color;
    }
    assembleVehicle();
    updateGarageColorPicker();
    saveVehicleDebounced();
  };

  window.showGarage = function() {
    loadVehicle();
    currentMode = 'garage';
    gameState = 'garage';
    hideVisualOverlays();
    document.getElementById('screen-garage').style.display = 'flex';
    document.getElementById('screen-title').style.display = 'none';
    gameoverOverlay.style.display = 'none';
    hudEl.style.display = 'none';
    hudSpeed.style.display = 'none';
    hudMultiplier.style.display = 'none';
    countdownOverlay.style.display = 'none';
    document.getElementById('screen-pause').style.display = 'none';
    setupGarageLighting();
    assembleVehicle();
    vehicleGroup.rotation.set(0, 0, 0);
    playerGroup.position.set(0, 0, 0);
    camera.position.set(2, 1.5, 2.5);
    camera.lookAt(0, 0.3, 0);

    // Hide track segments
    for (var i = 0; i < segmentPool.length; i++) {
      segmentPool[i].visible = false;
    }
    // Hide obstacles and collectibles
    for (var i = 0; i < activeObstacles.length; i++) activeObstacles[i].visible = false;
    for (var i = 0; i < activeCollectibles.length; i++) activeCollectibles[i].visible = false;

    // Update name
    var nameInput = document.getElementById('garage-vehicle-name');
    if (nameInput) nameInput.value = vehicleData.name;

    garageActiveTab = 'chassis';
    garageSelectTab('chassis');
    updateGarageStats();
  };

  window.startRaceFromGarage = function() {
    saveVehicle();
    document.getElementById('screen-garage').style.display = 'none';
    applyVehicleStats();
    setupRaceLighting();
    currentMode = 'race';
    vehicleGroup.rotation.set(0, 0, 0);

    // Show track segments
    for (var i = 0; i < segmentPool.length; i++) {
      segmentPool[i].visible = true;
      segmentPool[i].position.z = -i * SEGMENT_LENGTH;
    }

    // Reset race state
    score = 0;
    distance = 0;
    coins = 0;
    nearMisses = 0;
    isBoosted = false;
    boostEndTime = 0;
    lastMilestone = 0;
    sequenceQueue = [];
    lastSpawnedPattern = [false, false, false];
    scrollSpeed = getTargetSpeed(0) * 0.8;
    currentLane = 1;
    playerX = 0;
    targetX = 0;
    isSwitching = false;
    distanceSinceLastSpawn = 0;
    difficultyManager.reset();
    isJumping = false;
    eventManager.reset();
    currentZone = null;
    frameCounter = 0;
    lastSpawnedTypes = [];
    playerGroup.position.set(0, 0, 0);

    // Clear scenery
    for (var i = 0; i < activeScenery.length; i++) {
      activeScenery[i].visible = false;
    }
    activeScenery = [];

    camera.fov = 60;
    camera.updateProjectionMatrix();
    transition('countdown');
  };

  // ===================== INPUT =====================
  window.addEventListener('keydown', function(e) {
    if (e.key === 'Escape' || e.key === 'p') {
      togglePause();
      e.preventDefault();
      return;
    }
    if (gameState !== 'racing' || isPaused) return;
    if (e.key === 'ArrowLeft' || e.key === 'a') {
      switchLane(-1);
      e.preventDefault();
    } else if (e.key === 'ArrowRight' || e.key === 'd') {
      switchLane(1);
      e.preventDefault();
    }
  });

  var touchStartX = 0;
  var touchHandledBySwipe = false;

  renderer.domElement.addEventListener('touchstart', function(e) {
    if (gameState === 'garage') {
      e.preventDefault();
      garageDragging = true;
      garageDragStartX = e.touches[0].clientX;
      garageRotationStart = vehicleGroup.rotation.y;
      return;
    }
    if (gameState !== 'racing') return;
    e.preventDefault();
    touchStartX = e.touches[0].clientX;
    touchHandledBySwipe = false;
    var touch = e.touches[0];
    if (touch.clientX < window.innerWidth / 2) {
      switchLane(-1);
    } else {
      switchLane(1);
    }
  }, { passive: false });

  renderer.domElement.addEventListener('touchmove', function(e) {
    if (gameState === 'garage' && garageDragging) {
      e.preventDefault();
      var dx = e.touches[0].clientX - garageDragStartX;
      vehicleGroup.rotation.y = garageRotationStart + dx * 0.01;
    }
  }, { passive: false });

  renderer.domElement.addEventListener('touchend', function(e) {
    garageDragging = false;
    if (gameState !== 'racing' || isPaused) return;
    if (e.changedTouches && e.changedTouches.length > 0) {
      var dx = e.changedTouches[0].clientX - touchStartX;
      if (Math.abs(dx) > 30) {
        switchLane(dx > 0 ? 1 : -1);
      }
    }
  });

  renderer.domElement.addEventListener('mousedown', function(e) {
    if (gameState === 'garage') {
      garageDragging = true;
      garageDragStartX = e.clientX;
      garageRotationStart = vehicleGroup.rotation.y;
    }
  });

  window.addEventListener('mousemove', function(e) {
    if (gameState === 'garage' && garageDragging) {
      var dx = e.clientX - garageDragStartX;
      vehicleGroup.rotation.y = garageRotationStart + dx * 0.01;
    }
  });

  window.addEventListener('mouseup', function() {
    garageDragging = false;
  });

  // ===================== RESIZE =====================
  window.addEventListener('resize', function() {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  // ===================== PHASE 6: VISUAL POLISH =====================
  function updateSpeedLines() {
    var maxSpd = SPEED_TABLE[2000] || 17;
    var threshold = maxSpd * 0.5;
    var intensity = Math.max(0, (scrollSpeed - threshold) / (maxSpd - threshold));
    document.getElementById('speed-lines').style.opacity = intensity * 0.6;
  }

  function updateBoostOverlay() {
    var el = document.getElementById('boost-overlay');
    el.style.opacity = isBoosted ? '0.8' : '0';
  }

  function shakeScreen(intensity, duration) {
    intensity = intensity || 8;
    duration = duration || 400;
    var container = document.body;
    var start = performance.now();
    function tick(now) {
      var t = (now - start) / duration;
      if (t >= 1) { container.style.transform = ''; return; }
      var decay = 1 - t;
      var dx = (Math.random() - 0.5) * intensity * decay;
      var dy = (Math.random() - 0.5) * intensity * decay;
      container.style.transform = 'translate(' + dx + 'px,' + dy + 'px)';
      requestAnimationFrame(tick);
    }
    requestAnimationFrame(tick);
  }

  function flashCoinCollect() {
    var flash = document.createElement('div');
    flash.className = 'coin-flash';
    document.getElementById('effects-layer').appendChild(flash);
    setTimeout(function() { flash.remove(); }, 250);
  }

  function hideVisualOverlays() {
    document.getElementById('speed-lines').style.opacity = '0';
    document.getElementById('boost-overlay').style.opacity = '0';
    document.getElementById('vignette').style.opacity = '0';
  }

  function showRacingOverlays() {
    document.getElementById('vignette').style.opacity = '1';
  }

  // ===================== GAME LOOP =====================
  function gameLoop(time) {
    requestAnimationFrame(gameLoop);

    var dt = (time - lastTime) / 1000;
    lastTime = time;
    if (dt > MAX_DT) dt = MAX_DT;
    if (dt <= 0) dt = 0.016;

    var now = performance.now();

    if (gameState === 'title') {
      // Turntable rotation
      vehicleGroup.rotation.y += dt * 0.5;
    } else if (gameState === 'garage') {
      // Turntable unless dragging
      if (!garageDragging) {
        vehicleGroup.rotation.y += dt * 0.4;
      }
    } else if (gameState === 'countdown') {
      updateCountdown(now);
    } else if (gameState === 'racing') {
      if (!isPaused) {
        difficultyManager.update(distance);
        updateSpeed(dt);
        updateLanePosition(now);
        updateJump(now);
        updateTrack(dt);
        spawnObstacles(dt);
        updateObstacles(dt);
        updateScenery(dt);
        updateCollectibles(dt, time);
        checkCollisions();
        checkCollectibles();
        checkNearMisses();
        updateScore(dt);
        updateCamera();
        updateHUD();
        updateHUDSpeed();
        checkMilestones();
        // Environment zone update every 30 frames
        frameCounter++;
        if (frameCounter % 30 === 0) {
          updateEnvironmentZone();
        }
        // Spin wheels
        for (var i = 0; i < wheels.length; i++) {
          wheels[i].rotation.x += scrollSpeed * dt * 3;
        }
        // Phase 6: Visual polish updates
        updateSpeedLines();
        updateBoostOverlay();
        // FOV shift during boost
        if (isBoosted) {
          camera.fov = THREE.MathUtils.lerp(camera.fov, 72, 0.08);
        } else {
          camera.fov = THREE.MathUtils.lerp(camera.fov, 60, 0.04);
        }
        camera.updateProjectionMatrix();
        // Forward lean for downhill feel
        vehicleGroup.rotation.x = -0.15;
      }
    } else if (gameState === 'gameover') {
      updateGameover(now);
    }

    // Sun follows player roughly
    if (gameState !== 'title' && gameState !== 'garage') {
      sunLight.position.set(playerX + 4, 10, 5);
      sunLight.target.position.set(playerX, 0, -5);
    }

    renderer.render(scene, camera);
  }

  // ===================== INIT =====================
  function init() {
    loadVehicle();
    initTrack();
    buildPlayer();
    initObstacles();
    initCollectibles();
    scrollSpeed = getTargetSpeed(0) * 0.8;
    lastTime = performance.now();

    // Start in title mode
    gameState = 'title';
    currentMode = 'title';
    setupTitleLighting();
    camera.position.set(2.5, 2, 3.5);
    camera.lookAt(0, 0.3, 0);

    // Populate title screen stats
    document.getElementById('title-highscore').textContent = getHighScore().toLocaleString();
    document.getElementById('title-coins').textContent = (parseInt(localStorage.getItem('soapbox:total-coins') || '0')).toLocaleString();

    // Wire up title button (backup for onclick)
    document.getElementById('tap-to-start').addEventListener('click', function(e) {
      e.stopPropagation();
      window.startFromTitle();
    });

    requestAnimationFrame(gameLoop);
  }

  init();
})();
</script>
